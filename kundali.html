<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পূর্ব ভারতীয় রাশিচক্র (Fixed Chart)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fffaf0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        h1 { font-size: 22px; color: #333; margin-bottom: 20px; }
        .input-group { background: #fdf6e3; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        button { width: 100%; padding: 15px; background: #7a5d44; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #5d4531; }
        .chart-box { margin-top: 25px; position: relative; display: flex; justify-content: center; }
        
        /* ছবির আদলে লাল বর্ডার এবং কাঠামো */
        svg { background: white; border: 2px solid #e03131; }
        .cell-label { font-size: 11px; fill: #999; }
        .planet-txt { font-size: 13px; font-weight: bold; fill: #333; }
        .lagna-text { fill: #e03131; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚩 পূর্ব ভারতীয় (বাংলা) কুষ্ঠি ছক</h1>
    <div class="input-group">
        <input type="date" id="d" value="1986-10-31">
        <input type="time" id="t" value="23:59">
        <input type="number" id="lat" value="23.17" step="0.01" placeholder="অক্ষাংশ">
        <input type="number" id="lon" value="88.58" step="0.01" placeholder="দ্রাঘিমাংশ">
    </div>
    <button onclick="drawBengaliChart()">গণনা করুন ও ছকে দেখান</button>

    <div class="chart-box">
        <svg id="s" width="300" height="300" viewBox="0 0 300 300">
            <rect width="300" height="300" fill="none" stroke="#e03131" stroke-width="2"/>
            
            <line x1="100" y1="0" x2="100" y2="300" stroke="#e03131"/>
            <line x1="200" y1="0" x2="200" y2="300" stroke="#e03131"/>
            
            <line x1="0" y1="100" x2="300" y2="100" stroke="#e03131"/>
            <line x1="0" y1="200" x2="300" y2="200" stroke="#e03131"/>
            
            <line x1="0" y1="0" x2="100" y2="100" stroke="#e03131"/>
            <line x1="300" y1="0" x2="200" y2="100" stroke="#e03131"/>
            <line x1="0" y1="300" x2="100" y2="200" stroke="#e03131"/>
            <line x1="300" y1="300" x2="200" y2="200" stroke="#e03131"/>
            
            <rect x="100" y="100" width="100" height="100" fill="#fdf6e3" stroke="#e03131" stroke-width="1"/>
            <text x="150" y="155" text-anchor="middle" font-weight="bold" fill="#7a5d44">রাশিচক্র</text>

            <g id="planets"></g>
        </svg>
    </div>
    <div id="ayanText" style="margin-top: 10px; font-weight: bold;"></div>
</div>

<script src="vsop87-planets.js"></script>
<script>
// পূর্ব ভারতীয় (বাংলা) ছকের রাশির স্থানাঙ্ক ম্যাপ
// 0: মেষ, 1: বৃষ... 11: মীন
const cellCoords = [
    {x: 150, y: 50},  // 0: মেষ
    {x: 250, y: 50},  // 1: বৃষ
    {x: 350, y: 50},  // 2: মিথুন
    {x: 350, y: 150}, // 3: কর্কট
    {x: 350, y: 250}, // 4: সিংহ
    {x: 250, y: 250}, // 5: কন্যা
    {x: 150, y: 250}, // 6: তুলা
    {x: 50, y: 250},  // 7: বৃশ্চিক
    {x: 50, y: 150},  // 8: ধনু
    {x: 50, y: 50},   // 9: মকর
    {x: 150, y: 150}, // 10: কুম্ভ (অ্যাডজাস্টেবল)
    {x: 250, y: 150}  // 11: মীন
];

function drawBengaliChart() {
    try {
        const dv = document.getElementById('d').value.split('-');
        const tv = document.getElementById('t').value.split(':');
        const jd = window.JD(parseInt(dv[0]), parseInt(dv[1]), parseInt(dv[2])) + (parseInt(tv[0]) - 5.5 + parseInt(tv[1])/60)/24;
        const ay = window.lahiriAY(jd);
        document.getElementById('ayanText').innerText = `অয়নাংশ: ${ay.toFixed(4)}°`;

        const planets = [
            {n: 'সূ', v: window.sunL(jd)-ay}, {n: 'চ', v: window.moonL(jd)-ay},
            {n: 'ম', v: window.marsL(jd)}, {n: 'বু', v: window.mercuryL(jd)},
            {n: 'বৃ', v: window.jupiterL(jd)}, {n: 'শু', v: window.venusL(jd)},
            {n: 'শ', v: window.saturnL(jd)}, {n: 'রা', v: window.rahuL(jd)-ay},
            {n: 'কে', v: (window.rahuL(jd)-ay)+180},
            {n: 'ল', v: window.getLagna ? window.getLagna(jd, 22.57, 88.36) - ay : 0} // লগ্ন (ডিফল্ট Lat/Lon)
        ];

        const g = document.getElementById('planets');
        g.innerHTML = '';
        const data = Array.from({length: 12}, () => []);

        planets.forEach(p => {
            const idx = Math.floor(window.rev(p.v) / 30);
            data[idx].push(p.n);
        });

        // পূর্ব ভারতীয় ছকের ১২টি ঘরের স্থানাঙ্ক বিন্যাস
        const signPositions = [
            {x: 150, y: 50}, {x: 250, y: 50}, {x: 350, y: 50},  // মেষ, বৃষ, মিথুন
            {x: 350, y: 150}, {x: 350, y: 250},               // কর্কট, সিংহ
            {x: 250, y: 250}, {x: 150, y: 250}, {x: 50, y: 250}, // কন্যা, তুলা, বৃশ্চিক
            {x: 50, y: 150}, {x: 50, y: 50},                  // ধনু, মকর
            {x: 150, y: 150}, {x: 250, y: 150}                // কুম্ভ, মীন
        ];

        data.forEach((names, i) => {
            if (names.length > 0) {
                const pos = signPositions[i];
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", pos.x); t.setAttribute("y", pos.y);
                t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "planet-txt");
                if (names.includes('ল')) t.setAttribute("class", "planet-txt lagna-text");
                t.textContent = names.join(", ");
                g.appendChild(t);
            }
        });
    } catch (e) { alert("ইঞ্জিন কাজ করছে না। ফাইলের নাম চেক করুন।"); }
}
</script>
</body>
</html>
