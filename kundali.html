<script src="src/vsop87-planets.js"></script> 

<script>
// শহর সেট করার ফাংশন
function setCity(lat, lon) {
    document.getElementById('latitude').value = lat;
    document.getElementById('longitude').value = lon;
}

// বর্তমান সময় সেট
function setCurrentTime() {
    const now = new Date();
    document.getElementById('birthDate').value = now.toISOString().split('T')[0];
    document.getElementById('hour').value = now.getHours();
    document.getElementById('minute').value = now.getMinutes();
    document.getElementById('second').value = now.getSeconds();
    calculateHoroscope();
}

// নক্ষত্র ও রাশি তালিকা (আগের মতোই থাকবে)
const NAKSHATRAS = ["অশ্বিনী", "ভরণী", "কৃত্তিকা", "রোহিণী", "মৃগশিরা", "আর্দ্রা", "পুনর্বসু", "পুষ্যা", "অশ্লেষা", "মঘা", "পূর্বফাল্গুনী", "উত্তরফাল্গুনী", "হস্তা", "চিত্রা", "স্বাতী", "বিশাখা", "অনুরাধা", "জ্যেষ্ঠা", "মূলা", "পূর্বাষাঢ়া", "উত্তরাষাঢ়া", "শ্রবণা", "ধনিষ্ঠা", "শতভিষা", "পূর্বভাদ্রপদ", "উত্তরভাদ্রপদ", "রেবতী"];
const RASHIS = ["মেষ", "বৃষ", "মিথুন", "কর্কট", "সিংহ", "কন্যা", "তুলা", "বৃশ্চিক", "ধনু", "মকর", "কুম্ভ", "মীন"];

function getDetails(lon) {
    const normLon = rev(lon);
    const rIdx = Math.floor(normLon / 30);
    const deg = normLon % 30;
    const nIdx = Math.floor(normLon / (360/27));
    const pada = Math.floor((normLon % (360/27)) / (360/108)) + 1;
    return { rashi: RASHIS[rIdx], degree: deg, nak: NAKSHATRAS[nIdx], pada: pada };
}

function calculateHoroscope() {
    try {
        const dateStr = document.getElementById('birthDate').value;
        const h = parseInt(document.getElementById('hour').value) || 0;
        const m = parseInt(document.getElementById('minute').value) || 0;
        const s = parseInt(document.getElementById('second').value) || 0;
        const lat = parseFloat(document.getElementById('latitude').value);
        const lon = parseFloat(document.getElementById('longitude').value);

        const [year, month, day] = dateStr.split('-').map(Number);
        
        // IST থেকে UT তে রূপান্তর (৫:৩০ ঘণ্টা বিয়োগ)
        const utHour = h + m/60 + s/3600 - 5.5;
        const jd = JD(year, month, day) + utHour/24;
        
        // আপনার ফাইলের অয়নাংশ ফাংশন
        const ay = lahiriAY(jd);
        document.getElementById('ayanamsaDisplay').textContent = `লাহিড়ী আয়নাংশ: ${ay.toFixed(4)}°`;

        // আপনার ফাইলের গ্রহের ফাংশনগুলো ব্যবহার করে ডেটা তৈরি
        const planetList = [
            { name: 'সূর্য', lon: rev(sun(jd) - ay) },
            { name: 'চন্দ্র', lon: rev(moon(jd) - ay) },
            { name: 'বুধ', lon: rev(mercury(jd) - ay) },
            { name: 'শুক্র', lon: rev(venus(jd) - ay) },
            { name: 'মঙ্গল', lon: rev(mars(jd) - ay) },
            { name: 'বৃহস্পতি', lon: rev(jupiter(jd) - ay) },
            { name: 'শনি', lon: rev(saturn(jd) - ay) },
            { name: 'রাহু', lon: rev(rahu(jd)) }, // রাহু সাধারণত সায়নাংশেই থাকে আপনার ফাইলে
            { name: 'কেতু', lon: rev(rahu(jd) + 180) }
        ];

        let html = '';
        planetList.forEach(p => {
            const d = getDetails(p.lon);
            html += `<tr>
                <td class="planet-name">${p.name}</td>
                <td>${p.lon.toFixed(4)}°</td>
                <td>${d.rashi}</td>
                <td>${d.degree.toFixed(2)}°</td>
                <td>${d.nak}</td>
                <td>${d.pada}</td>
                <td>মার্গ</td>
            </tr>`;
        });
        document.getElementById('resultBody').innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("আপনার vsop87-planets.js ফাইলটি লোড হতে পারেনি। ফাইলের নাম চেক করুন।");
    }
}

window.onload = calculateHoroscope;
</script>
