<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>VSOP87 Engine Test</title>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #d1bfa7; padding: 10px; text-align: center; }
        th { background: #8d735b; color: white; }
        button { background: #7a5d44; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🌙 গ্রহাবস্থান পরীক্ষা (VSOP87)</h2>
    <div style="margin-bottom: 15px;">
        তারিখ: <input type="date" id="d" value="1986-10-31">
        সময়: <input type="time" id="t" value="23:59">
        <button onclick="check()">গণনা করুন</button>
    </div>

    <div id="ayan">অয়নাংশ: --</div>

    <table>
        <thead>
            <tr>
                <th>গ্রহ</th>
                <th>রাশি</th>
                <th>ডিগ্রি (ভুক্তি)</th>
                <th>নক্ষত্র (পদ)</th>
            </tr>
        </thead>
        <tbody id="out"></tbody>
    </table>
</div>

<script src="vsop87-planets.js"></script>

<script>
const R = ["মেষ", "বৃষ", "মিথুন", "কর্কট", "সিংহ", "কন্যা", "তুলা", "বৃশ্চিক", "ধনু", "মকর", "কুম্ভ", "মীন"];
const N = ["অশ্বিনী", "ভরণী", "কৃত্তিকা", "রোহিণী", "মৃগশিরা", "আর্দ্রা", "পুনর্বসু", "পুষ্যা", "অশ্লেষা", "মঘা", "পূর্বফাল্গুনী", "উত্তরফাল্গুনী", "হস্তা", "চিত্রা", "স্বাতী", "বিশাখা", "অনুরাধা", "জ্যেষ্ঠা", "মূলা", "পূর্বাষাঢ়া", "উত্তরাষাঢ়া", "শ্রবণা", "ধনিষ্ঠা", "শতভিষা", "পূর্বভাদ্রপদ", "উত্তরভাদ্রপদ", "রেবতী"];

function getInfo(lon) {
    const l = ((lon % 360) + 360) % 360;
    const rIdx = Math.floor(l / 30);
    const deg = l % 30;
    const nIdx = Math.floor(l / (360/27));
    const pada = Math.floor((l % (360/27)) / (360/108)) + 1;
    return { r: R[rIdx], d: deg.toFixed(2), n: N[nIdx], p: pada };
}

function check() {
    try {
        const dt = document.getElementById('d').value.split('-');
        const tm = document.getElementById('t').value.split(':');
        const y = parseInt(dt[0]), m = parseInt(dt[1]), d = parseInt(dt[2]);
        const h = parseInt(tm[0]), min = parseInt(tm[1]);

        // আপনার ফাইলের JD ফাংশন (IST to UT: -5.5)
        const jd = JD(y, m, d) + (h - 5.5 + min/60)/24;
        const ay = lahiriAY(jd);
        document.getElementById('ayan').innerText = "লাহিড়ী অয়নাংশ: " + ay.toFixed(4);

        // আপনার ফাইলের আসল ফাংশনগুলো কল করা হচ্ছে
        const planets = [
            { n: 'সূর্য', v: sun(jd) - ay },
            { n: 'চন্দ্র', v: moon(jd) - ay },
            { n: 'মঙ্গল', v: mars(jd) - ay },
            { n: 'বুধ', v: mercury(jd) - ay },
            { n: 'বৃহস্পতি', v: jupiter(jd) - ay },
            { n: 'শুক্র', v: venus(jd) - ay },
            { n: 'শনি', v: saturn(jd) - ay }
        ];

        let htm = "";
        planets.forEach(p => {
            const i = getInfo(p.v);
            htm += `<tr><td>${p.n}</td><td>${i.r}</td><td>${i.d}°</td><td>${i.n} (${i.p})</td></tr>`;
        });
        document.getElementById('out').innerHTML = htm;
    } catch (e) {
        alert("ভুল: " + e.message + "\nনিশ্চিত করুন vsop87-planets.js ফাইলটি ঠিক আছে।");
    }
}
window.onload = check;
</script>
</body>
</html>
