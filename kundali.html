<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>পূর্ব ভারতীয় কুষ্ঠি - বিশুদ্ধ বাংলা মডেল</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fffaf0; text-align: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #fdf6e3; padding: 15px; border-radius: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; width: 80%; margin: auto; }
        button { grid-column: span 2; padding: 12px; background: #7a5d44; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        /* চার্ট ডিজাইন */
        svg { background: white; border: 2px solid #e03131; margin: 20px 0; }
        .rashi-label { font-size: 10px; fill: #d32f2f; font-weight: bold; }
        .planet-txt { font-size: 12px; font-weight: bold; fill: #333; }
        .lagna-txt { fill: #e03131; }
        
        /* টেবিল ডিজাইন */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #e8d9cc; padding: 10px; text-align: center; }
        th { background-color: #8b725a; color: white; }
        tr:nth-child(even) { background-color: #faf6f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚩 পূর্ব ভারতীয় (বাংলা) রাশিচক্র</h2>
    
    <div class="input-box">
        <input type="date" id="d" value="1986-10-31">
        <input type="time" id="t" value="23:59">
        <input type="number" id="lat" value="22.57" step="0.01">
        <input type="number" id="lon" value="88.36" step="0.01">
        <button onclick="calculateKundali()">কুষ্ঠি গণনা ও ছক তৈরি করুন</button>
    </div>

    <svg id="chart" width="360" height="360" viewBox="0 0 360 360">
        <rect width="360" height="360" fill="none" stroke="#e03131" stroke-width="2"/>
        <line x1="120" y1="0" x2="120" y2="360" stroke="#e03131"/>
        <line x1="240" y1="0" x2="240" y2="360" stroke="#e03131"/>
        <line x1="0" y1="120" x2="360" y2="120" stroke="#e03131"/>
        <line x1="0" y1="240" x2="360" y2="240" stroke="#e03131"/>
        <line x1="0" y1="0" x2="120" y2="120" stroke="#e03131"/>
        <line x1="360" y1="0" x2="240" y2="120" stroke="#e03131"/>
        <line x1="0" y1="360" x2="120" y2="240" stroke="#e03131"/>
        <line x1="360" y1="360" x2="240" y2="240" stroke="#e03131"/>
        
        <text x="180" y="185" text-anchor="middle" font-weight="bold" fill="#7a5d44" font-size="16">রাশিচক্র</text>
        
        <g id="rashiLabels"></g>
        <g id="planetsGroup"></g>
    </svg>

    <div id="ayanInfo" style="font-weight:bold; color:#7a5d44; margin-bottom:10px;"></div>

    <table id="dataTable">
        <thead>
            <tr><th>গ্রহ</th><th>রাশি</th><th>ডিগ্রি</th><th>নক্ষত্র (পদ)</th></tr>
        </thead>
        <tbody id="dataBody">
            <tr><td colspan="4">তথ্য প্রদর্শনের জন্য গণনা করুন</td></tr>
        </tbody>
    </table>
</div>

<script src="src/vsop87-planets.js"></script>

<script>
const R_NAMES = ["মেষ", "বৃষ", "মিথুন", "কর্কট", "সিংহ", "কন্যা", "তুলা", "বৃশ্চিক", "ধনু", "মকর", "কুম্ভ", "মীন"];
const N_NAMES = ["অশ্বিনী", "ভরণী", "কৃত্তিকা", "রোহিণী", "মৃগশিরা", "আর্দ্রা", "পুনর্বসু", "পুষ্যা", "অশ্লেষা", "মঘা", "পূর্বফাল্গুনী", "উত্তরফাল্গুনী", "হস্তা", "চিত্রা", "স্বাতী", "বিশাখা", "অনুরাধা", "জ্যেষ্ঠা", "মূলা", "পূর্বাষাঢ়া", "উত্তরাষাঢ়া", "শ্রবণা", "ধনিষ্ঠা", "শতভিষা", "পূর্বভাদ্রপদ", "উত্তরভাদ্রপদ", "রেবতী"];

// আপনার আঁকা ম্যাপ অনুযায়ী ১২টি রাশির সঠিক সেন্টার কোঅর্ডিনেট (X, Y)
const CUSTOM_MAP = [
    {x: 180, y: 55},  // 0: মেষ (Top Middle)
    {x: 300, y: 55},  // 1: বৃষ (Top Right)
    {x: 315, y: 150}, // 2: মিথুন (Right Middle)
    {x: 315, y: 270}, // 3: কর্কট (Bottom Right - Outer)
    {x: 300, y: 315}, // 4: সিংহ (Bottom Right - Inner)
    {x: 180, y: 315}, // 5: কন্যা (Bottom Middle)
    {x: 60, y: 315},  // 6: তুলা (Bottom Left - Inner)
    {x: 45, y: 270},  // 7: বৃশ্চিক (Bottom Left - Outer)
    {x: 45, y: 150},  // 8: ধনু (Left Middle)
    {x: 60, y: 55},   // 9: মকর (Top Left - Inner)
    {x: 45, y: 45},   // 10: কুম্ভ (Top Left - Outer)
    {x: 270, y: 45}   // 11: মীন (Top Right - Outer)
];

function calculateKundali() {
    try {
        const d = document.getElementById('d').value.split('-').map(Number);
        const t = document.getElementById('t').value.split(':').map(Number);
        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);

        const jd = window.JD(d[0], d[1], d[2]) + (t[0] - 5.5 + t[1]/60)/24;
        const ay = window.lahiriAY(jd);
        document.getElementById('ayanInfo').innerText = `লাহিড়ী অয়নাংশ: ${ay.toFixed(4)}°`;

        const planets = [
            {id: "ল", n: "লগ্ন", v: window.getLagna(jd, lat, lon) - ay},
            {id: "সূ", n: "সূর্য", v: window.sunL(jd) - ay},
            {id: "চ", n: "চন্দ্র", v: window.moonL(jd) - ay},
            {id: "ম", n: "মঙ্গল", v: window.marsL(jd)},
            {id: "বু", n: "বুধ", v: window.mercuryL(jd)},
            {id: "বৃ", n: "বৃহস্পতি", v: window.jupiterL(jd)},
            {id: "শু", n: "শুক্র", v: window.venusL(jd)},
            {id: "শ", n: "শনি", v: window.saturnL(jd)},
            {id: "রা", n: "রাহু", v: window.rahuL(jd) - ay},
            {id: "কে", n: "কেতু", v: (window.rahuL(jd) - ay) + 180}
        ];

        drawOutput(planets);
    } catch(e) { alert("ইঞ্জিন লোড হতে পারেনি। ফাইলের নাম ও পাথ চেক করুন।"); }
}

function drawOutput(planets) {
    const pGroup = document.getElementById('planetsGroup');
    const rGroup = document.getElementById('rashiLabels');
    const tBody = document.getElementById('dataBody');
    pGroup.innerHTML = ''; rGroup.innerHTML = ''; tBody.innerHTML = '';

    const rashiData = Array.from({length: 12}, () => []);

    planets.forEach(p => {
        const lon = window.rev(p.v);
        const rIdx = Math.floor(lon / 30);
        const nIdx = Math.floor(lon / (360/27));
        const pada = Math.floor((lon % (360/27)) / (360/108)) + 1;
        
        // চার্টের জন্য লেবেল (যেমন: সূ(১৪))
        rashiData[rIdx].push(`${p.id}(${nIdx + 1})`);

        // টেবিল তৈরি
        tBody.innerHTML += `<tr>
            <td style="font-weight:bold">${p.n}</td>
            <td>${R_NAMES[rIdx]}</td>
            <td>${(lon % 30).toFixed(2)}°</td>
            <td>${N_NAMES[nIdx]} (${pada})</td>
        </tr>`;
    });

    // আপনার ম্যাপ অনুযায়ী চার্টে গ্রহ বসানো
    CUSTOM_MAP.forEach((pos, i) => {
        // রাশির নাম বসানো
        const rText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        rText.setAttribute("x", pos.x); rText.setAttribute("y", pos.y - 15);
        rText.setAttribute("text-anchor", "middle"); rText.setAttribute("class", "rashi-label");
        rText.textContent = R_NAMES[i];
        rGroup.appendChild(rText);

        // গ্রহ ও নক্ষত্র সংখ্যা বসানো
        if(rashiData[i].length > 0) {
            const pText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            pText.setAttribute("x", pos.x); pText.setAttribute("y", pos.y + 5);
            pText.setAttribute("text-anchor", "middle"); pText.setAttribute("class", "planet-txt");
            pText.textContent = rashiData[i].join(", ");
            pGroup.appendChild(pText);
        }
    });
}
    // লগ্ন বের করার জন্য এই ফাংশনটি আপনার HTML কোডে যোগ করুন
window.getLagna = function(jd, lat, lon) {
    const T = (jd - 2451545.0) / 36525.0;
    const JD0 = Math.floor(jd - 0.5) + 0.5;
    const UT = (jd - JD0) * 24.0;
    const T0 = (JD0 - 2451545.0) / 36525.0;
    let gmst = 100.46061837 + 36000.770053608 * T0 + 0.000387933 * T0 * T0 + 360.985647366 * (UT / 24.0);
    gmst = ((gmst % 360) + 360) % 360;
    let lst = ((gmst + lon) % 360 + 360) % 360 * (Math.PI / 180);
    let eps = (23.4392911 - (46.8150 / 3600) * T) * (Math.PI / 180);
    let latR = lat * (Math.PI / 180);
    let y = -Math.cos(lst);
    let x = Math.sin(eps) * Math.tan(latR) + Math.cos(eps) * Math.sin(lst);
    let asc = Math.atan2(y, x) * (180 / Math.PI);
    return ((asc % 360) + 360) % 360;
};

</script>
</body>
</html>
