<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 নির্ভুল বৈদিক ক্যালকুলেটর · লগ্ন · নক্ষত্র</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif; }
        body { background: #f2ede4; margin: 20px; display: flex; justify-content: center; }
        .card { max-width: 1350px; width: 100%; background: #fffdf9; border-radius: 28px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); padding: 24px 28px; border: 1px solid #ddd0be; }
        h1 { font-size: 2.1rem; color: #382e22; margin-bottom: 12px; border-bottom: 3px solid #c6ad93; padding-bottom: 16px; }
        .input-panel { background: #efe6db; padding: 20px 24px; border-radius: 24px; margin-bottom: 28px; display: flex; flex-wrap: wrap; align-items: flex-end; gap: 18px 25px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-weight: 600; color: #4d3826; }
        .field input, .field select { padding: 10px 14px; border-radius: 20px; border: 1px solid #b8a088; font-size: 1rem; background: white; }
        .btn { background: #7b5e45; border: none; color: white; font-weight: bold; padding: 10px 26px; border-radius: 40px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border: 1px solid #5c4431; }
        .btn:hover { background: #5b4532; }
        .btn-outline { background: transparent; color: #3e2f20; border: 1.5px solid #7b5e45; box-shadow: none; }
        .now-btn { background: #2a5e4b; border-color: #1e4438; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.04); margin: 22px 0; }
        th { background: #b7a088; color: #1e160f; font-weight: 700; padding: 14px 8px; text-align: center; }
        td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #e5d7ca; }
        .planet-name { font-weight: 700; background: #fbf4ec; text-align: left; padding-left: 20px; }
        .retro-badge { background: #b34a3a; color: white; font-size: 0.7rem; border-radius: 30px; padding: 3px 9px; margin-left: 8px; }
        .yoga-section { background: #f3ebe3; border-radius: 22px; padding: 18px 22px; margin-top: 20px; }
        .yoga-item { background: white; border-radius: 30px; padding: 8px 22px; border-left: 6px solid #b4875a; margin: 5px; display: inline-block; }
        .ayanamsa-badge { background: #dacbbc; padding: 6px 18px; border-radius: 30px; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>🌙 বৈদিক গ্রহস্থিতি · লগ্ন · নক্ষত্র পদ <span style="font-size:1.2rem; margin-left:20px;">VSOP87D / ELP-2000</span></h1>

    <div class="input-panel">
        <div class="field">
            <label>📅 তারিখ (DD/MM/YYYY বা YYYY-MM-DD)</label>
            <input type="text" id="dateInput" value="31/10/1986" placeholder="31/10/1986">
        </div>
        <div class="field">
            <label>🕒 সময় (IST, ২৪ঘ)</label>
            <input type="text" id="timeInput" value="23:59" placeholder="HH:MM">
        </div>
        <div class="field">
            <label>🌐 অক্ষাংশ (°N)</label>
            <input type="number" id="latInput" value="22.5726" step="0.01">
        </div>
        <div class="field">
            <label>📍 দ্রাঘিমা (°E)</label>
            <input type="number" id="lonInput" value="88.3639" step="0.01">
        </div>
        <div class="btn-group">
            <button class="btn" id="calcBtn">🔍 গণনা</button>
            <button class="btn btn-outline now-btn" id="nowBtn">🕰️ এখন</button>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between;">
        <div><strong id="displayDateTime">—</strong></div>
        <div class="ayanamsa-badge" id="ayanamsaDisplay">আয়নাংশ: —</div>
    </div>

    <table id="chartTable">
        <thead><tr><th>গ্রহ</th><th>দ্রাঘিমাংশ</th><th>রাশি</th><th>ডিগ্রী</th><th>নক্ষত্র</th><th>পদ</th><th>বক্র?</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="7">গণনা করতে উপরের তথ্য দিন</td></tr></tbody>
    </table>

    <div class="yoga-section">
        <div style="font-size:1.5rem; font-weight:700;">🪷 যোগফল</div>
        <div id="yogaList" style="margin-top:14px;">—</div>
    </div>
</div>

<script src="src/vsop87-planets.js"></script>
<script>
    (function(){
        const { JD_IST, planetaryPositions, getRetrogrades, detectYogas, lahiriAY } = window;

        // ইউটিলিটি: বিভিন্ন তারিখ ফরম্যাট পার্স (DD/MM/YYYY বা YYYY-MM-DD)
        function parseDateInput(str) {
            str = str.trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
                const [y,m,d] = str.split('-').map(Number);
                return { year: y, month: m, day: d };
            }
            // DD/MM/YYYY বা D/M/YYYY
            const parts = str.split(/[\/\-\.]/);
            if (parts.length === 3) {
                let d, m, y;
                if (parts[0].length === 4) { // YYYY-MM-DD already handled, but fallback
                    y = +parts[0]; m = +parts[1]; d = +parts[2];
                } else {
                    d = +parts[0]; m = +parts[1]; y = +parts[2];
                }
                if (y < 100) y += 2000;
                return { year: y, month: m, day: d };
            }
            return null;
        }

        const NAKSHATRAS = ["অশ্বিনী","ভরণী","কৃত্তিকা","রোহিণী","মৃগশিরা","আর্দ্রা","পুনর্বসু","পুষ্যা","অশ্লেষা","মঘা","পূর্বফাল্গুনী","উত্তরফাল্গুনী","হস্তা","চিত্রা","স্বাতী","বিশাখা","অনুরাধা","জ্যেষ্ঠা","মূলা","পূর্বাষাঢ়া","উত্তরাষাঢ়া","শ্রবণা","ধনিষ্ঠা","শতভিষা","পূর্বভাদ্রপদ","উত্তরভাদ্রপদ","রেবতী"];
        const RASHI_NAMES = ["মেষ","বৃষ","মিথুন","কর্কট","সিংহ","কন্যা","তুলা","বৃশ্চিক","ধনু","মকর","কুম্ভ","মীন"];

        function getNakshatraPada(lon) {
            const span = 360 / 27;
            const padaSpan = span / 4;
            let idx = Math.floor(lon / span);
            if (idx >= 27) idx = 26;
            const rem = lon - idx * span;
            const pada = Math.floor(rem / padaSpan) + 1;
            return { nakshatra: NAKSHATRAS[idx], pada };
        }

        function getRashiAndDegree(lon) {
            const rIdx = Math.floor(lon / 30);
            const deg = (lon % 30).toFixed(4);
            return { rashi: RASHI_NAMES[rIdx], degree: deg, rashiIndex: rIdx };
        }

        // উন্নত লগ্ন গণনা (Meeus + লাহিড়ী)
        function calculateLagna(jd, lat, lon) {
            const T = (jd - 2451545.0) / 36525.0;
            let GST = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T*T*T/38710000.0;
            GST = ((GST % 360) + 360) % 360;
            let LST = GST + lon;
            LST = ((LST % 360) + 360) % 360;
            const obl = 23.4392911 - 0.0130042 * T;
            const lstRad = LST * Math.PI/180;
            const latRad = lat * Math.PI/180;
            const oblRad = obl * Math.PI/180;
            const num = -Math.cos(oblRad) * Math.sin(lstRad);
            const den = Math.cos(latRad)*Math.sin(oblRad) - Math.sin(latRad)*Math.cos(oblRad)*Math.cos(lstRad);
            let lagnaTrop = Math.atan2(num, den) * 180 / Math.PI;
            if (lagnaTrop < 0) lagnaTrop += 360;
            const ay = lahiriAY(jd);
            return (lagnaTrop - ay + 360) % 360;
        }

        function render(data) {
            const { positions, retros, yogas, ayanamsa, lagnaLon } = data;
            const tbody = document.getElementById('tableBody');
            const planets = [
                { key:'lagna', name:'লগ্ন', lon: lagnaLon },
                { key:'sun', name:'সূর্য', lon: positions.sun },
                { key:'moon', name:'চন্দ্র', lon: positions.moon },
                { key:'mercury', name:'বুধ', lon: positions.mercury },
                { key:'venus', name:'শুক্র', lon: positions.venus },
                { key:'mars', name:'মঙ্গল', lon: positions.mars },
                { key:'jupiter', name:'বৃহস্পতি', lon: positions.jupiter },
                { key:'saturn', name:'শনি', lon: positions.saturn },
                { key:'rahu', name:'রাহু', lon: positions.rahu },
                { key:'ketu', name:'কেতু', lon: positions.ketu }
            ];
            let html = '';
            planets.forEach(p => {
                const rData = getRashiAndDegree(p.lon);
                const nData = getNakshatraPada(p.lon);
                const retro = (p.key!=='lagna' && p.key!=='rahu' && p.key!=='ketu') ? retros[p.key] : false;
                const retroBadge = retro ? '<span class="retro-badge">বক্র</span>' : '—';
                html += `<tr><td class="planet-name">${p.name}</td><td>${p.lon.toFixed(4)}°</td><td>${rData.rashi}</td><td>${rData.degree}°</td><td>${nData.nakshatra}</td><td>${nData.pada}</td><td>${retroBadge}</td></tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('ayanamsaDisplay').innerText = `আয়নাংশ (লাহিড়ী): ${ayanamsa.toFixed(4)}°`;
            const yogaDiv = document.getElementById('yogaList');
            if (yogas.length) {
                yogaDiv.innerHTML = yogas.map(y => `<div class="yoga-item"><b>${y.name}</b> (${y.type}) · ${y.description}</div>`).join('');
            } else yogaDiv.innerText = 'কোনো প্রধান যোগ সক্রিয় নয়।';
        }

        function compute() {
            const dateRaw = document.getElementById('dateInput').value.trim();
            const timeRaw = document.getElementById('timeInput').value.trim();
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            const parsed = parseDateInput(dateRaw);
            if (!parsed) { alert('তারিখ ফরম্যাট: DD/MM/YYYY বা YYYY-MM-DD'); return; }
            const { year, month, day } = parsed;
            const [h, m] = timeRaw.split(':').map(Number);
            if (isNaN(h) || isNaN(m)) { alert('সময় HH:MM ফরম্যাটে দিন'); return; }
            const hourIST = h + m/60.0;
            const jd = JD_IST(year, month, day, hourIST);
            const positions = planetaryPositions(jd);
            const retros = getRetrogrades(jd);
            const ayanamsa = positions.ayanamsa;
            const lagnaLon = calculateLagna(jd, lat, lon);
            const yogas = detectYogas(positions);
            const pad = (n) => n.toString().padStart(2,'0');
            document.getElementById('displayDateTime').innerHTML = 
                `${year}-${pad(month)}-${pad(day)} ${pad(h)}:${pad(m)} IST, অক্ষ ${lat.toFixed(3)}° দ্রাঘি ${lon.toFixed(3)}°`;
            render({ positions, retros, yogas, ayanamsa, lagnaLon });
        }

        function setNow() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth()+1).padStart(2,'0');
            const d = String(now.getDate()).padStart(2,'0');
            document.getElementById('dateInput').value = `${d}/${m}/${y}`;
            document.getElementById('timeInput').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            compute();
        }

        document.getElementById('calcBtn').addEventListener('click', compute);
        document.getElementById('nowBtn').addEventListener('click', setNow);
        window.addEventListener('DOMContentLoaded', () => {
            // ডিফল্ট হিসেবে 31/10/1986 23:59 সেট
            document.getElementById('dateInput').value = '31/10/1986';
            document.getElementById('timeInput').value = '23:59';
            document.getElementById('latInput').value = '22.5726';
            document.getElementById('lonInput').value = '88.3639';
            compute();
        });
    })();
</script>
</body>
</html>
