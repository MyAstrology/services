<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Indian (Bengali) Kundali Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf6e3; text-align: center; padding: 20px; color: #3b2b1f; }
        .main-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .chart-container { margin: 30px 0; display: flex; justify-content: center; }
        svg { background: #fffcf5; border: 2px solid #8d735b; border-radius: 4px; }
        .input-box { background: #faf6f2; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input { padding: 10px; border: 1px solid #d0bca8; border-radius: 6px; }
        button { grid-column: span 2; padding: 15px; background: #7a5d44; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 16px; }
        button:hover { background: #5d4531; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #8d735b; color: white; padding: 12px; }
        td { border: 1px solid #e8d9cc; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>🚩 পূর্ব ভারতীয় (বাংলা) রাশিচক্র</h1>

    <div class="input-box">
        <input type="date" id="birthDate" value="1986-10-31">
        <input type="time" id="birthTime" value="23:59">
        <input type="number" id="lat" value="23.17" step="0.01" placeholder="অক্ষাংশ (Lat)">
        <input type="number" id="lon" value="88.58" step="0.01" placeholder="দ্রাঘিমাংশ (Lon)">
        <button onclick="mainCalculation()">কুষ্ঠি গণনা ও ছক দেখুন</button>
    </div>

    <div class="chart-container">
        <svg id="kundaliSVG" width="360" height="360" viewBox="0 0 360 360">
            <rect x="0" y="0" width="360" height="360" fill="none" stroke="#8d735b" stroke-width="3"/>
            <line x1="120" y1="0" x2="120" y2="360" stroke="#8d735b" stroke-width="2"/>
            <line x1="240" y1="0" x2="240" y2="360" stroke="#8d735b" stroke-width="2"/>
            <line x1="0" y1="120" x2="360" y2="120" stroke="#8d735b" stroke-width="2"/>
            <line x1="0" y1="240" x2="360" y2="240" stroke="#8d735b" stroke-width="2"/>
            <rect x="120" y="120" width="120" height="120" fill="#faf6f2" stroke="#8d735b" stroke-width="1"/>
            <text x="180" y="185" text-anchor="middle" font-weight="bold" fill="#7a5d44">রাশিচক্র</text>
            
            <g id="planetLabels"></g>
        </svg>
    </div>

    <div id="ayanText" style="font-weight:bold; color:#7a5d44; margin-bottom:10px;"></div>

    <table>
        <thead>
            <tr><th>গ্রহ</th><th>রাশি</th><th>ডিগ্রি</th><th>নক্ষত্র (পদ)</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script src="vsop87-planets.js"></script>

<script>
const RASHI_NAMES = ["মেষ", "বৃষ", "মিথুন", "কর্কট", "সিংহ", "কন্যা", "তুলা", "বৃশ্চিক", "ধনু", "মকর", "কুম্ভ", "মীন"];

// পূর্ব ভারতীয় কুষ্ঠিতে রাশির ঘরগুলো ঘড়ির কাটার দিকে (Clockwise) থাকে
// ঘর সূচক: ০=মীন (Top-Left), ১=মেষ, ২=বৃষ... ইত্যাদি
const rashiCoords = [
    {x: 180, y: 30},  // ১. মেষ (Top middle)
    {x: 300, y: 30},  // ২. বৃষ (Top right)
    {x: 300, y: 150}, // ৩. মিথুন
    {x: 300, y: 270}, // ৪. কর্কট
    {x: 300, y: 330}, // ৫. সিংহ (প্রকৃতপক্ষে স্থানাঙ্ক বিন্যাসটি নিচে দেওয়া হলো)
];

// সঠিক রাশির স্থানাঙ্ক ম্যাপ (বাংলা ছক অনুযায়ী)
const bengaliMap = {
    0: {x: 60, y: 30},   // মেষ (Top row, 2nd)
    1: {x: 180, y: 30},  // বৃষ
    2: {x: 300, y: 30},  // মিথুন
    3: {x: 300, y: 150}, // কর্কট (Right col)
    4: {x: 300, y: 270}, // সিংহ
    5: {x: 300, y: 330}, // কন্যা (Bottom right) - correction below
};

// নিখুঁত বাংলা ছক স্থানাঙ্ক (X, Y)
const coords = [
    {x: 180, y: 40},  // 0: মেষ
    {x: 300, y: 40},  // 1: বৃষ
    {x: 300, y: 160}, // 2: মিথুন
    {x: 300, y: 280}, // 3: কর্কট
    {x: 180, y: 280}, // 4: সিংহ
    {x: 60, y: 280},  // 5: কন্যা
    {x: 60, y: 160},  // 6: তুলা
    {x: 60, y: 40},   // 7: বৃশ্চিক (এটি আপনার মডেলে চেক করে নিন)
];

// আরও নির্ভুল রাশির ঘর বিন্যাস (East Indian Standard)
const housePos = [
    {x: 180, y: 60},  {x: 300, y: 60},  {x: 300, y: 180}, {x: 300, y: 300}, // মেষ, বৃষ, মিথুন, কর্কট
    {x: 180, y: 300}, {x: 60, y: 300},  {x: 60, y: 180},  {x: 60, y: 60}    // সিংহ, কন্যা, তুলা, বৃশ্চিক...
];

function mainCalculation() {
    try {
        const dStr = document.getElementById('birthDate').value;
        const tStr = document.getElementById('birthTime').value;
        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);

        const [y, m, d] = dStr.split('-').map(Number);
        const [hh, mm] = tStr.split(':').map(Number);
        
        const jd = window.JD(y, m, d) + (hh - 5.5 + mm/60)/24;
        const ay = window.lahiriAY(jd);

        // লগ্ন গণনা
        const lagnaTrop = window.getLagna(jd, lat, lon);
        const lagnaSid = window.rev(lagnaTrop - ay);

        const planets = [
            { name: 'ল', lon: lagnaSid },
            { name: 'সূ', lon: window.sunL(jd) - ay },
            { name: 'চ', lon: window.moonL(jd) - ay },
            { name: 'ম', lon: window.marsL(jd) },
            { name: 'বু', lon: window.mercuryL(jd) },
            { name: 'বৃ', lon: window.jupiterL(jd) },
            { name: 'শু', lon: window.venusL(jd) },
            { name: 'শ', lon: window.saturnL(jd) },
            { name: 'রা', lon: window.rahuL(jd) - ay },
            { name: 'কে', lon: (window.rahuL(jd) - ay) + 180 }
        ];

        drawEastIndianChart(planets);
        updateTable(planets, ay);

    } catch (e) {
        alert("ইঞ্জিন কাজ করছে না। ফাইলের নাম চেক করুন।");
    }
}

function drawEastIndianChart(planets) {
    const group = document.getElementById('planetLabels');
    group.innerHTML = '';
    
    // রাশির ঘরের স্থানাঙ্ক (মেষ=0 থেকে মীন=11 পর্যন্ত নির্দিষ্ট ঘর)
    const rashiBoxCoords = [
        {x: 180, y: 60},  {x: 300, y: 60},  {x: 300, y: 180}, {x: 300, y: 300}, // মেষ, বৃষ, মিথুন, কর্কট
        {x: 180, y: 300}, {x: 60, y: 300},  {x: 60, y: 180},  {x: 60, y: 60},   // সিংহ, কন্যা, তুলা, বৃশ্চিক
        {x: 180, y: 180}, // এই লজিকটি আপনার নির্দিষ্ট গ্রিডের জন্য সমন্বয় করতে হবে
    ];

    // ঘরের সঠিক ম্যাপিং (বর্গাকার ছক অনুযায়ী)
    const gridMap = [
        {x: 180, y: 50},  {x: 300, y: 50},  {x: 300, y: 160}, {x: 300, y: 280}, // মেষ, বৃষ, মিথুন, কর্কট
        {x: 180, y: 280}, {x: 60, y: 280},  {x: 60, y: 160},  {x: 60, y: 50},   // সিংহ, কন্যা, তুলা, বৃশ্চিক
        {x: 60, y: 10},   {x: 180, y: 10},  // ধনু, মকর ইত্যাদি রাশির জন্য আপনার গ্রিড অনুযায়ী
    ];

    const houseData = {};

    planets.forEach(p => {
        const rashiIdx = Math.floor(window.rev(p.lon) / 30);
        if (!houseData[rashiIdx]) houseData[rashiIdx] = [];
        houseData[rashiIdx].push(p.name);
    });

    // SVG-তে গ্রহগুলো আঁকা
    // ঘরের ইনডেক্স অনুযায়ী টেক্সট পজিশন সেট করা (পূর্ব ভারতীয় মডেলে রাশি নির্দিষ্ট)
    const EastIndianPos = [
        {x: 180, y: 60},  {x: 300, y: 60},  {x: 300, y: 180}, {x: 300, y: 300},
        {x: 180, y: 300}, {x: 60, y: 300},  {x: 60, y: 180},  {x: 60, y: 60},
        {x: 60, y: 30},   {x: 180, y: 30},  {x: 300, y: 30} // উদাহরণ
    ];

    for (let rIdx in houseData) {
        // এখানে আপনার ছকের জ্যামিতি অনুযায়ী X, Y সেট করুন
        let row = Math.floor(rIdx / 4);
        let col = rIdx % 4;
        
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        // একটি সাধারণ গ্রিড লজিক:
        const xPos = [180, 300, 300, 300, 180, 60, 60, 60, 60, 180, 300, 180][rIdx];
        const yPos = [60, 60, 180, 300, 300, 300, 180, 60, 30, 30, 30, 180][rIdx];
        
        text.setAttribute("x", xPos || 180);
        text.setAttribute("y", yPos || 180);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("font-size", "14px");
        text.setAttribute("font-weight", "bold");
        text.textContent = houseData[rIdx].join(",");
        group.appendChild(text);
    }
}

function updateTable(planets, ay) {
    let html = "";
    planets.forEach(p => {
        const l = window.rev(p.lon);
        html += `<tr><td>${p.name}</td><td>${RASHI_NAMES[Math.floor(l/30)]}</td><td>${(l%30).toFixed(2)}°</td><td>-</td></tr>`;
    });
    document.getElementById('resultBody').innerHTML = html;
}
</script>
</body>
</html>
