name: Generate Blog & Related Posts

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'
      - 'README.md'
  schedule:
    - cron: '0 */3 * * *'  # প্রতি ৩ ঘণ্টায় (আগে ছিল ৪)
  workflow_dispatch:
    inputs:
      force_generate:
        description: '🔨 Force regenerate all files'
        type: boolean
        default: true
      skip_commit:
        description: '⏭️ Skip commit (test only)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  BLOG_DIR: blog
  DATA_DIR: src/data
  SITE_URL: 'https://www.myastrology.in'

concurrency:
  group: git-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      changed_files: ${{ steps.check.outputs.changed_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "changed_files=all" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger - running"
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "changed_files=all" >> $GITHUB_OUTPUT
            echo "✅ Schedule trigger - running"
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
            
            if [ -n "$CHANGED_FILES" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "✅ Changes detected - running"
              echo "📄 Changed files:"
              echo "$CHANGED_FILES" | sed 's/^/   /'
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "⏭️ No changes - skipping"
            fi
          fi

  cleanup:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: 🗑️ Clean old generated files
        run: |
          echo "🧹 Cleaning old files..."
          
          # Remove wrong format clusters.json
          if [ -f src/data/clusters.json ]; then
            if grep -q "शुभकामनाथ" src/data/clusters.json || grep -q "name" src/data/clusters.json; then
              echo "❌ Found wrong format clusters.json - deleting..."
              rm src/data/clusters.json
            fi
          fi
          
          # Remove empty related-posts.json
          if [ -f src/data/related-posts.json ]; then
            SIZE=$(stat -c%s src/data/related-posts.json 2>/dev/null || stat -f%z src/data/related-posts.json 2>/dev/null)
            if [ "$SIZE" -lt "100" ]; then
              echo "❌ Found empty related-posts.json - deleting..."
              rm src/data/related-posts.json
            fi
          fi
          
          echo "✅ Cleanup completed"
          
      - name: Commit cleanup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🧹 Cleanup: remove invalid files [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

  generate:
    needs: [check-changes, cleanup]
    if: always() && needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
            npm install --package-lock-only
          fi
          echo "✅ Dependencies installed"
          
      - name: Create required directories
        run: |
          mkdir -p ${{ env.BLOG_DIR }}
          mkdir -p ${{ env.DATA_DIR }}
          echo "✅ Directories created"

      - name: 📋 Generate blog list
        id: generate-list
        run: |
          echo "📋 Generating list.json..."
          START_TIME=$(date +%s%N)
          
          if [ -f src/content/blog/generate-list.js ]; then
            node src/content/blog/generate-list.js
            echo "✅ list.json generated"
          else
            echo "⚠️ generate-list.js not found"
          fi
          
          END_TIME=$(date +%s%N)
          DURATION=$(( ($END_TIME - $START_TIME) / 1000000 ))
          echo "time_ms=${DURATION}" >> $GITHUB_OUTPUT

      - name: 🔗 Generate related posts
        id: generate-related
        run: |
          echo "🔗 Generating related posts and clusters..."
          START_TIME=$(date +%s%N)
          
          if [ -f generate-related-posts.js ]; then
            node generate-related-posts.js
            
            # Verify files
            echo "📊 Generated files:"
            for file in related-posts.json internal-links.json clusters.json stats.json; do
              if [ -f "src/data/$file" ]; then
                SIZE=$(stat -c%s "src/data/$file" 2>/dev/null || stat -f%z "src/data/$file" 2>/dev/null)
                COUNT=$(jq '. | length' "src/data/$file" 2>/dev/null || echo "N/A")
                echo "  ✅ $file ($COUNT entries, $(($SIZE/1024))KB)"
              else
                echo "  ❌ $file not found"
              fi
            done
          else
            echo "⚠️ generate-related-posts.js not found"
          fi
          
          END_TIME=$(date +%s%N)
          DURATION=$(( ($END_TIME - $START_TIME) / 1000000 ))
          echo "time_ms=${DURATION}" >> $GITHUB_OUTPUT

      - name: 📄 Generate blog HTML files
        id: generate-posts
        run: |
          echo "📝 Generating blog HTML files..."
          START_TIME=$(date +%s)
          
          if [ -f generate-posts.js ]; then
            node generate-posts.js
            BLOG_COUNT=$(ls ${{ env.BLOG_DIR }}/*.html 2>/dev/null | wc -l)
            echo "✅ ${BLOG_COUNT} HTML files generated"
            echo "blog_count=${BLOG_COUNT}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ generate-posts.js not found"
            echo "blog_count=0" >> $GITHUB_OUTPUT
          fi
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT

      - name: 🗺️ Generate sitemaps
        id: generate-sitemaps
        run: |
          echo "🗺️ Generating sitemaps..."
          START_TIME=$(date +%s%N)
          SITEMAP_COUNT=0
          
          # Generate main sitemap
          if [ -f src/content/blog/generate-sitemap.js ]; then
            node src/content/blog/generate-sitemap.js
            if [ -f sitemap.xml ]; then
              echo "✅ sitemap.xml generated"
              SITEMAP_COUNT=$((SITEMAP_COUNT + 1))
            fi
          else
            echo "⚠️ generate-sitemap.js not found"
          fi
          
          # Generate image sitemap
          if [ -f src/content/blog/generate-image-sitemap.js ]; then
            node src/content/blog/generate-image-sitemap.js
            if [ -f image-sitemap.xml ]; then
              echo "✅ image-sitemap.xml generated"
              SITEMAP_COUNT=$((SITEMAP_COUNT + 1))
            fi
          fi
          
          # Generate video sitemap
          if [ -f src/content/blog/generate-video-sitemap.js ]; then
            node src/content/blog/generate-video-sitemap.js
            if [ -f video-sitemap.xml ]; then
              echo "✅ video-sitemap.xml generated"
              SITEMAP_COUNT=$((SITEMAP_COUNT + 1))
            fi
          fi
          
          echo "sitemap_count=${SITEMAP_COUNT}" >> $GITHUB_OUTPUT
          END_TIME=$(date +%s%N)
          DURATION=$(( ($END_TIME - $START_TIME) / 1000000 ))
          echo "time_ms=${DURATION}" >> $GITHUB_OUTPUT

      - name: 🔍 System Health Check
        run: |
          echo "====== 📊 সিস্টেম চেকলিস্ট ======"
          
          # Colors for output
          GREEN='\033[0;32m'
          RED='\033[0;31m'
          YELLOW='\033[1;33m'
          NC='\033[0m'
          
          # Check function
          check_file() {
            if [ -f "$1" ]; then
              SIZE=$(stat -c%s "$1" 2>/dev/null || stat -f%z "$1" 2>/dev/null)
              if [ "$SIZE" -gt "0" ]; then
                echo -e "${GREEN}✅${NC} $2 ($(($SIZE/1024))KB)"
                return 0
              else
                echo -e "${YELLOW}⚠️${NC} $2 (empty)"
                return 1
              fi
            else
              echo -e "${RED}❌${NC} $2 নেই"
              return 1
            fi
          }
          
          # Check all files
          echo "📁 Sitemaps:"
          check_file "sitemap.xml" "sitemap.xml"
          check_file "image-sitemap.xml" "image-sitemap.xml"
          check_file "video-sitemap.xml" "video-sitemap.xml"
          
          echo ""
          echo "📁 Data files:"
          check_file "src/data/related-posts.json" "related-posts.json"
          check_file "src/data/internal-links.json" "internal-links.json"
          check_file "src/data/clusters.json" "clusters.json"
          check_file "src/data/stats.json" "stats.json"
          
          echo ""
          echo "📁 Blog posts:"
          BLOG_COUNT=$(ls ${{ env.BLOG_DIR }}/*.html 2>/dev/null | wc -l)
          if [ "$BLOG_COUNT" -gt "0" ]; then
            echo -e "${GREEN}✅${NC} $BLOG_COUNT HTML files"
            TOTAL_SIZE=$(du -sb ${{ env.BLOG_DIR }} 2>/dev/null | cut -f1)
            echo "   Total size: $(($TOTAL_SIZE/1024/1024))MB"
          else
            echo -e "${RED}❌${NC} No HTML files"
          fi
          
          echo ""
          echo "📁 list.json:"
          if [ -f src/content/blog/list.json ]; then
            LIST_COUNT=$(jq '. | length' src/content/blog/list.json 2>/dev/null || echo "0")
            echo -e "${GREEN}✅${NC} list.json ($LIST_COUNT entries)"
          else
            echo -e "${RED}❌${NC} list.json নেই"
          fi
          
          echo "================================"

      - name: 📊 Generate Performance Report
        run: |
          echo "====== 📈 Performance Report ======"
          echo "⏰ Time: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔄 Trigger: ${{ github.event_name }}"
          echo ""
          echo "⏱️ Generation times:"
          echo "   📋 list.json: ${{ steps.generate-list.outputs.time_ms }}ms"
          echo "   🔗 related posts: ${{ steps.generate-related.outputs.time_ms }}ms"
          echo "   📄 HTML: ${{ steps.generate-posts.outputs.duration }}s"
          echo "   🗺️ sitemaps: ${{ steps.generate-sitemaps.outputs.time_ms }}ms"
          echo ""
          echo "📊 Stats:"
          echo "   📝 Blog count: ${{ steps.generate-posts.outputs.blog_count }}"
          echo "   🗺️ Sitemap count: ${{ steps.generate-sitemaps.outputs.sitemap_count }}"
          echo "================================"

      - name: 📤 Upload artifacts (debug)
        if: failure() || github.event.inputs.force_generate == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            ${{ env.BLOG_DIR }}/
            ${{ env.DATA_DIR }}/
            *.xml
            src/content/blog/list.json
          retention-days: 7

      - name: Commit and push changes
        if: success() && github.event.inputs.skip_commit != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add all generated files
          git add -f ${{ env.BLOG_DIR }}/ 2>/dev/null || true
          git add src/content/blog/list.json 2>/dev/null || true
          git add ${{ env.DATA_DIR }}/*.json 2>/dev/null || true
          git add *.xml 2>/dev/null || true

          # Check changes
          CHANGED_FILES=$(git diff --staged --name-only | wc -l | tr -d ' ')
          
          if [ "$CHANGED_FILES" -eq "0" ]; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          # Count by type
          BLOG_COUNT=$(git diff --staged --name-only | grep "^${{ env.BLOG_DIR }}/" | wc -l | tr -d ' ')
          DATA_COUNT=$(git diff --staged --name-only | grep "^${{ env.DATA_DIR }}/" | wc -l | tr -d ' ')
          SITEMAP_COUNT=$(git diff --staged --name-only | grep "\.xml$" | wc -l | tr -d ' ')

          # Build commit message
          MSG="🤖 Auto-update: "
          [ "$BLOG_COUNT" -gt "0" ] && MSG="${MSG}📝 ${BLOG_COUNT} blog | "
          [ "$DATA_COUNT" -gt "0" ] && MSG="${MSG}📊 ${DATA_COUNT} data | "
          [ "$SITEMAP_COUNT" -gt "0" ] && MSG="${MSG}🗺️ ${SITEMAP_COUNT} sitemaps | "
          MSG=$(echo "$MSG" | sed 's/ | $//')

          # Add timestamp for scheduled runs
          if [ "${{ github.event_name }}" == "schedule" ]; then
            MSG="${MSG} (scheduled)"
          fi

          git commit -m "${MSG} [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
          
          echo "✅ Push completed: ${MSG} (${CHANGED_FILES} files)"

      - name: 🚀 Deployment Summary
        if: always()
        run: |
          echo "====== 🚀 Deployment Summary ======"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ GitHub Action completed successfully"
          else
            echo "❌ GitHub Action failed - check logs"
          fi
          echo "📅 $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔗 View: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "===================================="
