name: Generate Blog & Sitemaps

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**.md'
      - 'generate-posts.js'
      - 'src/content/blog/generate-list.js'
      - 'src/content/blog/generate-sitemap.js'
      - 'src/content/blog/generate-image-sitemap.js'
      - 'src/content/blog/generate-video-sitemap.js'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter --no-package-lock

      - name: Create required directories
        run: mkdir -p blog

      - name: "\U0001F4DD Generate blog HTML files"
        run: |
          node generate-posts.js
          echo "blog/ ফাইল সংখ্যা: $(ls blog/*.html 2>/dev/null | wc -l)"

      - name: "\U0001F4CB Generate list.json"
        run: node src/content/blog/generate-list.js

      - name: "\U0001F5FA️ Generate sitemap.xml"
        run: node src/content/blog/generate-sitemap.js

      - name: "\U0001F5BC️ Generate image-sitemap.xml"
        run: node src/content/blog/generate-image-sitemap.js

      - name: "\U0001F4FA Generate video-sitemap.xml"
        run: node src/content/blog/generate-video-sitemap.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # ✅ FIX: সব generated ফাইল add করা হচ্ছে
          git add -f blog/
          git add src/content/blog/list.json
          git add sitemap.xml image-sitemap.xml video-sitemap.xml

          # কী কী পরিবর্তন হয়েছে গণনা করা
          BLOG_COUNT=$(git diff --staged --name-only | grep '^blog/' | wc -l | tr -d ' ')
          SITEMAP_COUNT=$(git diff --staged --name-only | grep 'sitemap' | wc -l | tr -d ' ')
          LIST_CHANGED=$(git diff --staged --name-only | grep 'list.json' | wc -l | tr -d ' ')

          if git diff --staged --quiet; then
            echo "ℹ️ কোনো পরিবর্তন নেই"
            exit 0
          fi

          # emoji সহ commit message তৈরি
          MSG=""
          [ "$BLOG_COUNT"    -gt "0" ] && MSG="${MSG}📝 blog/ ${BLOG_COUNT}টি HTML | "
          [ "$LIST_CHANGED"  -gt "0" ] && MSG="${MSG}📋 list.json | "
          [ "$SITEMAP_COUNT" -gt "0" ] && MSG="${MSG}🗺️ sitemap | "
          [ -z "$MSG" ]                && MSG="🤖 auto-update | "

          # শেষের " | " সরানো
          MSG=$(echo "$MSG" | sed 's/ | $//')

          git commit -m "${MSG} [skip ci]"
          git pull --rebase origin main
          git push origin main
          echo "✅ Push সম্পন্ন: ${MSG}"
