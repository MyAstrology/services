name: Generate Blog & Sitemaps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter --no-package-lock

      - name: Create public directory
        run: mkdir -p public

      - name: Generate static blog HTML files
        run: node generate-posts.js

      - name: Generate blog list
        run: node src/content/blog/generate-list.js

      - name: Generate sitemaps
        run: |
          node src/content/blog/generate-sitemap.js
          node src/content/blog/generate-image-sitemap.js
          node src/content/blog/generate-video-sitemap.js

      - name: Commit and push all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ src/content/blog/list.json sitemap.xml sitemap*.xml image-sitemap.xml video-sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update blog posts & sitemaps [skip ci]"
            git push origin main
          fi
