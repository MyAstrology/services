name: Generate Blog & Sitemaps

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**.md'
      - 'generate-posts.js'
      - 'src/content/blog/generate-list.js'
      - 'src/content/blog/generate-sitemap.js'
      - 'src/content/blog/generate-image-sitemap.js'
      - 'src/content/blog/generate-video-sitemap.js'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter --no-package-lock

      - name: Create required directories
        run: mkdir -p public blog

      - name: "\U0001F4DD Generate blog HTML files"
        run: node generate-posts.js

      - name: "\U0001F4CB Generate list.json"
        run: node src/content/blog/generate-list.js

      - name: "\U0001F5FA️ Generate sitemap.xml"
        run: node src/content/blog/generate-sitemap.js

      - name: "\U0001F5BC️ Generate image-sitemap.xml"
        run: node src/content/blog/generate-image-sitemap.js

      - name: "\U0001F4FA Generate video-sitemap.xml"
        run: node src/content/blog/generate-video-sitemap.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ src/content/blog/list.json sitemap.xml image-sitemap.xml video-sitemap.xml

          BLOG_COUNT=$(git diff --staged --name-only | grep '^blog/' | wc -l | tr -d ' ')
          SITEMAP_CHANGED=$(git diff --staged --name-only | grep 'sitemap' | wc -l | tr -d ' ')
          LIST_CHANGED=$(git diff --staged --name-only | grep 'list.json' | wc -l | tr -d ' ')

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          MSG=""
          if [ "$BLOG_COUNT" -gt "0" ]; then
            MSG="${MSG}📝 blog/ ${BLOG_COUNT} HTML | "
          fi
          if [ "$LIST_CHANGED" -gt "0" ]; then
            MSG="${MSG}📋 list.json | "
          fi
          if [ "$SITEMAP_CHANGED" -gt "0" ]; then
            MSG="${MSG}🗺️ sitemap | "
          fi
          if [ -z "$MSG" ]; then
            MSG="🤖 auto-update | "
          fi
          MSG=$(echo "$MSG" | sed 's/ | $//')

          git commit -m "${MSG} [skip ci]"
          git pull --rebase origin main
          git push origin main
          echo "Pushed: ${MSG}"
