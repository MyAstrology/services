name: Generate Blog & Related Posts

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/content/blog/**'
      - 'generate-*.js'
      - 'src/data/*.json'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force_generate:
        description: '🔨 Force regenerate all files'
        type: boolean
        default: false
      skip_commit:
        description: '⏭️ Skip commit (test only)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  BLOG_DIR: blog
  DATA_DIR: src/data

concurrency:
  group: git-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Check for changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Manual/schedule trigger - running"
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED_FILES" | grep -E "src/content/blog/|generate-|src/data/|package.json"; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "✅ Relevant files changed - running"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "⏭️ No relevant changes - skipping"
            fi
          fi

  cleanup:
    needs: validate
    if: needs.validate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: 🗑️ Delete old clusters.json (if wrong format)
        run: |
          if [ -f src/data/clusters.json ]; then
            # Check if it's the wrong format (Hindi/old format)
            if grep -q "शुभकामनाथ" src/data/clusters.json || grep -q "name" src/data/clusters.json; then
              echo "❌ Found wrong format clusters.json - deleting..."
              rm src/data/clusters.json
              echo "✅ Deleted wrong clusters.json"
            else
              echo "✅ clusters.json format looks correct"
            fi
          fi
          
      - name: Commit cleanup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/clusters.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🧹 Cleanup: remove wrong clusters.json [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

  build:
    needs: cleanup
    if: always() && needs.validate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "📦 Using package-lock.json"
            npm ci --no-audit --no-fund
          else
            echo "📦 Installing dependencies"
            npm install --no-audit --no-fund
            npm install --package-lock-only
          fi
          echo "✅ Dependencies installed"
          
      - name: Create required directories
        run: |
          mkdir -p ${{ env.BLOG_DIR }}
          mkdir -p ${{ env.DATA_DIR }}
          echo "✅ Directories created"

      - name: 📋 Generate blog list
        run: |
          echo "📋 Generating list.json..."
          if [ -f src/content/blog/generate-list.js ]; then
            node src/content/blog/generate-list.js
            echo "✅ list.json generated"
          else
            echo "⚠️ generate-list.js not found"
          fi

      - name: 🔗 Generate related posts (AI-like analysis)
        id: generate-related
        run: |
          echo "🔗 Generating related posts and clusters..."
          
          if [ -f generate-related-posts.js ]; then
            node generate-related-posts.js
            
            # Verify files were created
            echo "📊 Generated files:"
            for file in related-posts.json internal-links.json clusters.json stats.json; do
              if [ -f "src/data/$file" ]; then
                SIZE=$(stat -c%s "src/data/$file" 2>/dev/null || stat -f%z "src/data/$file" 2>/dev/null)
                echo "  ✅ $file ($(($SIZE/1024))KB)"
                
                # Show sample of clusters.json (first 5 lines)
                if [ "$file" == "clusters.json" ]; then
                  echo "  📝 Sample:"
                  head -5 "src/data/$file" | sed 's/^/    /'
                fi
              else
                echo "  ❌ $file not found"
              fi
            done
          else
            echo "⚠️ generate-related-posts.js not found"
          fi

      - name: 📄 Generate blog HTML files
        id: generate-posts
        run: |
          echo "📝 Generating blog HTML files..."
          
          if [ -f generate-posts.js ]; then
            node generate-posts.js
            BLOG_COUNT=$(ls ${{ env.BLOG_DIR }}/*.html 2>/dev/null | wc -l)
            echo "✅ ${BLOG_COUNT} HTML files generated"
            echo "blog_count=${BLOG_COUNT}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ generate-posts.js not found"
            echo "blog_count=0" >> $GITHUB_OUTPUT
          fi

      - name: 🗺️ Generate sitemaps
        run: |
          echo "🗺️ Generating sitemaps..."
          
          for sitemap in generate-sitemap generate-image-sitemap generate-video-sitemap; do
            if [ -f "src/content/blog/${sitemap}.js" ]; then
              node "src/content/blog/${sitemap}.js"
              echo "✅ ${sitemap}.js completed"
            fi
          done

      - name: 🔍 System Health Check
        run: |
          echo "====== 📊 সিস্টেম চেকলিস্ট ======"
          
          # Check function
          check_file() {
            if [ -f "$1" ]; then
              SIZE=$(stat -c%s "$1" 2>/dev/null || stat -f%z "$1" 2>/dev/null)
              if [ "$SIZE" -gt "0" ]; then
                echo "✅ $2 ($(($SIZE/1024))KB)"
                return 0
              else
                echo "⚠️ $2 (empty)"
                return 1
              fi
            else
              echo "❌ $2 নেই"
              return 1
            fi
          }
          
          # Check all files
          check_file "sitemap.xml" "sitemap.xml"
          check_file "image-sitemap.xml" "image-sitemap.xml"
          check_file "video-sitemap.xml" "video-sitemap.xml"
          
          echo ""
          echo "📁 Data files:"
          check_file "src/data/related-posts.json" "related-posts.json"
          check_file "src/data/internal-links.json" "internal-links.json"
          check_file "src/data/clusters.json" "clusters.json"
          check_file "src/data/stats.json" "stats.json"
          
          echo ""
          echo "📝 Blog posts:"
          BLOG_COUNT=$(ls ${{ env.BLOG_DIR }}/*.html 2>/dev/null | wc -l)
          if [ "$BLOG_COUNT" -gt "0" ]; then
            echo "✅ ${BLOG_COUNT} HTML files"
          else
            echo "❌ No HTML files"
          fi
          
          echo "================================"

      - name: 📊 Generate stats report
        if: success() || failure()
        run: |
          echo "====== 📈 জেনারেশন রিপোর্ট ======"
          echo "⏰ Time: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          
          if [ -f src/data/stats.json ]; then
            echo "📊 Statistics:"
            jq -r '
              "   📝 Total posts: \(.totalPosts // 0)",
              "   🔗 Total links: \(.totalLinks // 0)",
              "   📈 Avg links/post: \(.avgLinksPerPost // 0)",
              "",
              "📊 Cluster distribution:",
              (.clusters | to_entries | sort_by(-.value) | .[] | "   \(.key): \(.value) posts")
            ' src/data/stats.json | head -15
          fi
          
          echo "================================"

      - name: Commit and push changes
        if: success() && github.event.inputs.skip_commit != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add files
          git add -f ${{ env.BLOG_DIR }}/ 2>/dev/null || true
          git add src/content/blog/list.json 2>/dev/null || true
          git add ${{ env.DATA_DIR }}/*.json 2>/dev/null || true
          git add sitemap.xml image-sitemap.xml video-sitemap.xml 2>/dev/null || true

          # Check changes
          CHANGED_FILES=$(git diff --staged --name-only | wc -l | tr -d ' ')
          
          if [ "$CHANGED_FILES" -eq "0" ]; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          # Count by type
          BLOG_COUNT=$(git diff --staged --name-only | grep "^${{ env.BLOG_DIR }}/" | wc -l | tr -d ' ')
          DATA_COUNT=$(git diff --staged --name-only | grep "^${{ env.DATA_DIR }}/" | wc -l | tr -d ' ')

          # Build message
          MSG="🤖 Auto-update: "
          [ "$BLOG_COUNT" -gt "0" ] && MSG="${MSG}📝 ${BLOG_COUNT} blog | "
          [ "$DATA_COUNT" -gt "0" ] && MSG="${MSG}📊 ${DATA_COUNT} data | "
          MSG=$(echo "$MSG" | sed 's/ | $//')

          git commit -m "${MSG} [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
          
          echo "✅ Push completed: ${MSG} (${CHANGED_FILES} files)"

      - name: 🚀 Deployment Summary
        if: always()
        run: |
          echo "====== 🚀 Deployment Summary ======"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ GitHub Action completed successfully"
          else
            echo "❌ GitHub Action failed"
          fi
          echo "📅 $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "===================================="

      # ❌ ভর্তি upload-artifact সরানো হয়েছে (v3 deprecated)
      # নতুন করে যোগ করার দরকার নেই
