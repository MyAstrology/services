name: Rashifal Daily Generator

on:
  schedule:
    - cron: '30 15 * * *'   # IST 21:00 (রাত 9টা)
    - cron: '30 17 * * *'   # IST 23:00 (রাত 11টা - ব্যাকআপ)
  workflow_dispatch:
    inputs:
      date:
        description: 'তারিখ (YYYY-MM-DD) – খালি রাখলে অটো-ডিটেক্ট'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  generate:
    name: Generate Daily Rashifal
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install system dependencies (for canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
          
      - name: Install npm dependencies
        run: npm ci
        env:
          CI: true
          
      - name: Generate Rashifal
        id: generate
        run: |
          cd src
          node generate.js
        env:
          TARGET_DATE: ${{ github.event.inputs.date || '' }}
          TZ: 'Asia/Kolkata'
          NODE_ENV: production
          
      - name: Cleanup old files
        run: |
          mkdir -p cache rashifal
          find cache -name "planets-*.json" -mtime +30 -delete 2>/dev/null || true
          find rashifal -name "*.html" -mtime +365 -delete 2>/dev/null || true
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # শুধু rashifal ও cache ফোল্ডারের পরিবর্তন যোগ করুন
          git add rashifal/ cache/
          
          # পরিবর্তন আছে কিনা চেক করুন
          if git diff --cached --quiet; then
            echo "📭 কোনো পরিবর্তন নেই"
            exit 0
          fi
          
          # কমিট করুন
          git commit -m "Rashifal: daily update $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M')"
          
          # পুশ করুন
          git push origin HEAD:main
