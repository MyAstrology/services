name: Daily Rashifal Generator (IST)

on:
  schedule:
    - cron: '30 15 * * *'   # IST 21:00
    - cron: '30 17 * * *'   # IST 23:00
  workflow_dispatch:
    inputs:
      date:
        description: 'তারিখ (YYYY-MM-DD) – খালি রাখলে অটো-ডিটেক্ট'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  generate:
    name: Generate All (Blog + Rashifal)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install system dependencies (for canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
          
      - name: Install npm dependencies
        run: npm ci
        env:
          CI: true
          
      - name: Create required directories
        run: |
          mkdir -p cache rashifal src/content/blog
          
      # ========== ব্লগ জেনারেটর ==========
      - name: Generate blog list
        run: npm run generate-list
        continue-on-error: true
        
      - name: Generate related posts
        run: npm run generate-related
        continue-on-error: true
        
      - name: Generate blog HTML files
        run: npm run generate-posts
        continue-on-error: true
        
      # ========== সাইটম্যাপ ==========
      - name: Generate sitemaps
        run: |
          echo "Generating sitemaps..."
        continue-on-error: true
        
      # ========== রাশিফল জেনারেটর ==========
      - name: Generate Rashifal
        run: |
          cd src
          node generate.js
        env:
          TARGET_DATE: ${{ github.event.inputs.date || '' }}
          TZ: 'Asia/Kolkata'
          NODE_ENV: production
        continue-on-error: true
        
      # ========== ক্লিনআপ ==========
      - name: Cleanup old cache files
        run: |
          find cache -name "planets-*.json" -mtime +30 -delete 2>/dev/null || true
          find rashifal -name "*.html" -mtime +365 -delete 2>/dev/null || true
          
      # ========== COMMIT AND PUSH (NO REBASE) ==========
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # সব পরিবর্তন স্টেজ করুন
          git add -A
          
          # পরিবর্তন আছে কিনা চেক করুন
          if git diff --cached --quiet; then
            echo "📭 কোনো পরিবর্তন নেই"
            exit 0
          fi
          
          # কমিট করুন
          git commit -m "Auto-update: $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M')"
          
          # সরাসরি পুশ করুন (pull/rebase ছাড়া)
          git push origin HEAD:main --force-with-lease
