name: Daily Rashifal Generator

on:
  schedule:
    - cron: '25 18 * * *'   # UTC 18:25 = IST 00:25 (মধ্যরাত)
  workflow_dispatch:
    inputs:
      date_override:
        description: 'তারিখ override (YYYY-MM-DD, খালি = আগামীকাল)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm install --no-audit --no-fund
          echo "✅ Dependencies installed"

      - name: Create rashifal directory
        run: mkdir -p rashifal

      - name: Set target date
        id: set_date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            TARGET="${{ github.event.inputs.date_override }}"
            echo "📅 Manual override: $TARGET"
          else
            TARGET=$(TZ='Asia/Kolkata' date -d tomorrow +%Y-%m-%d)
            echo "📅 Tomorrow IST: $TARGET"
          fi
          echo "TARGET_DATE=${TARGET}" >> $GITHUB_OUTPUT
          echo "✅ TARGET_DATE set to: ${TARGET}"

      - name: Debug - Show target date
        run: |
          echo "🔍 TARGET_DATE from step output: ${{ steps.set_date.outputs.TARGET_DATE }}"
          echo "🔍 Current time IST: $(TZ='Asia/Kolkata' date)"
          echo "🔍 Tomorrow date: $(TZ='Asia/Kolkata' date -d tomorrow +%Y-%m-%d)"

      - name: Generate daily rashifal
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
          TZ: 'Asia/Kolkata'
        run: |
          echo "🔮 Target: $TARGET_DATE"
          echo "📂 Current directory: $(pwd)"
          echo "📂 Contents of src/ before generation:"
          ls -la src/ || echo "src/ not found"
          echo "🔍 Checking src/generate.js:"
          if [ -f "src/generate.js" ]; then
            echo "✅ src/generate.js exists"
            head -20 src/generate.js
          else
            echo "❌ src/generate.js NOT FOUND!"
            echo "Looking for generate.js elsewhere:"
            find . -name "generate.js" -type f
          fi
          echo "📂 Contents of rashifal/ before generation:"
          ls -la rashifal/ || echo "rashifal/ empty or not found"

          set -e
          cd src && node generate.js
          cd ..

          echo "📁 After generation, rashifal/ contents:"
          ls -la rashifal/

          echo "🔍 Looking for: rashifal/${TARGET_DATE}.html"
          if [ -f "rashifal/${TARGET_DATE}.html" ]; then
            echo "✅ File exists at rashifal/${TARGET_DATE}.html"
            SIZE=$(wc -c < "rashifal/${TARGET_DATE}.html")
            echo "✅ rashifal/${TARGET_DATE}.html তৈরি হয়েছে (${SIZE} bytes)"
          else
            echo "❌ File NOT found at rashifal/${TARGET_DATE}.html"
            echo "🔍 Also checking ../rashifal/${TARGET_DATE}.html:"
            if [ -f "../rashifal/${TARGET_DATE}.html" ]; then
              echo "✅ File exists at ../rashifal/${TARGET_DATE}.html"
              ls -la ../rashifal/
            else
              echo "❌ File also not found at ../rashifal/${TARGET_DATE}.html"
            fi
            echo "❌ FATAL: rashifal/${TARGET_DATE}.html তৈরি হয়নি!"
            exit 1
          fi

      - name: Update sitemaps
        run: |
          echo "✅ sitemap-rashifal.xml and sitemap-news.xml updated by generate.js"
          echo "📁 Current sitemaps:"
          ls -la sitemap-*.xml 2>/dev/null || echo "No sitemaps found yet"

      - name: Check for changes
        id: check_changes
        run: |
          git status --short
          if git diff --quiet && git diff --staged --quiet && \
             [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ কোনো পরিবর্তন নেই"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ পরিবর্তন পাওয়া গেছে"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "MyAstrology Bot"
          git add rashifal/ sitemap-rashifal.xml sitemap-news.xml 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit after all"
            exit 0
          fi

          git commit -m "📅 দৈনিক রাশিফল: ${TARGET_DATE} | MyAstrology Bot"

          git fetch origin main
          git pull origin main --rebase --strategy-option=ours || {
            echo "⚠️ Rebase failed, trying merge"
            git pull origin main --no-rebase --strategy-option=ours
          }

          git push origin main
          echo "🚀 Push সম্পন্ন"

      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: echo "ℹ️ ${TARGET_DATE}-এর রাশিফল আগেই তৈরি আছে"

      - name: Send failure notification
        if: failure() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ রাশিফল generation ব্যর্থ!\\n📅 ${TARGET_DATE}\\n🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK_URL" || true

      - name: Summary
        if: always()
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          echo "## 🔮 Daily Rashifal Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| বিষয় | তথ্য |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| তারিখ | ${TARGET_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | v20 LTS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ফাইল | rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://www.myastrology.in/rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          if [ -f "rashifal/${TARGET_DATE}.html" ]; then
            SIZE=$(wc -c < "rashifal/${TARGET_DATE}.html")
            echo "| সাইজ | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **সফলভাবে তৈরি হয়েছে**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **ফাইল তৈরি হয়নি**" >> $GITHUB_STEP_SUMMARY
          fi
