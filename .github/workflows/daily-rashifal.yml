name: Daily Rashifal Generator (IST)

on:
  schedule:
    # UTC ১৫:৩০ = IST ২১:০০ (রাত ৯টা) – ইনডেক্সিং টাইম বিবেচনায়
    - cron: '30 15 * * *'
    # ব্যাকআপ: UTC ১৭:৩০ = IST ২৩:০০ (রাত ১১টা)
    - cron: '30 17 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'তারিখ (YYYY-MM-DD) – খালি রাখলে অটো-ডিটেক্ট'
        required: false
        type: string
        default: ''
      force_generate:
        description: 'ফোর্স জেনারেট (পুরনো ওভাররাইট)'
        required: false
        type: boolean
        default: false

# পারমিশন
permissions:
  contents: write
  actions: read

jobs:
  generate:
    name: Generate Rashifal Pages
    runs-on: ubuntu-latest
    
    # টাইমআউট ১০ মিনিট
    timeout-minutes: 10
    
    steps:
      # 1. কোড চেকআউট
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          
      # 2. Node.js সেটআপ
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      # 3. npm ক্যাশ রিস্টোর
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      # 4. নির্ভরতা ইনস্টল
      - name: Install dependencies
        run: |
          npm install
          # Canvas লাইব্রেরি (OG ইমেজের জন্য) – প্রয়োজন হলে আনকমেন্ট করুন
          # sudo apt-get update
          # sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
          # npm install canvas
        env:
          CI: true
          
      # 5. রাশিফল জেনারেট
      - name: Generate Rashifal
        id: generate
        run: |
          cd src
          node generate.js
        env:
          TARGET_DATE: ${{ github.event.inputs.date || '' }}
          FORCE_GENERATE: ${{ github.event.inputs.force_generate || 'false' }}
          TZ: 'Asia/Kolkata'
          NODE_ENV: production
          
      # 6. রান টাইম লগ সেভ
      - name: Save generation log
        if: always()
        run: |
          echo "## 🔮 Generation Log" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| মেট্রিক | মান |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| তারিখ | ${{ env.GEN_DATE || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| চন্দ্র রাশি | ${{ env.MOON_RASHI || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| সূর্য রাশি | ${{ env.SUN_RASHI || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| তিথি | ${{ env.TITHI || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| নক্ষত্র | ${{ env.NAKSHATRA || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| যোগ | ${{ env.YOGA || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          
      # 7. ক্যাশ ক্লিনআপ (পুরনো ফাইল মুছে ফেলা)
      - name: Cleanup old cache files
        run: |
          # ৩০ দিনের বেশি পুরনো ক্যাশ ফাইল মুছে ফেলা
          find cache -name "planets-*.json" -mtime +30 -delete 2>/dev/null || true
          # ৩৬৫ দিনের বেশি পুরনো আর্কাইভ ফাইল মুছে ফেলা (রিপোজিটরি সাইজ কন্ট্রোল)
          find rashifal -name "*.html" -mtime +365 -delete 2>/dev/null || true
          echo "✅ পুরনো ফাইল ক্লিনআপ সম্পন্ন"
          
      # 8. কমিট এবং পুশ (সীমাবদ্ধতা সহ)
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # রিপোজিটরি সাইজ চেক (১GB এর বেশি হলে সতর্কতা)
          REPO_SIZE=$(du -sb . | cut -f1)
          if [ $REPO_SIZE -gt 1000000000 ]; then
            echo "⚠️ রিপোজিটরি সাইজ ১GB ছাড়িয়েছে! পুরনো ফাইল মুছে ফেলার পরামর্শ দেওয়া হচ্ছে।"
          fi
          
          # পরিবর্তন চেক
          if git diff --quiet && git diff --staged --quiet; then
            echo "📭 কোনো পরিবর্তন নেই, কমিট স্কিপ করা হচ্ছে"
          else
            # আর্কাইভ ফাইল সংখ্যা সীমিত রাখা (সর্বোচ্চ ৩৬৫টি)
            cd rashifal
            # মাস্টার আর্কাইভ ছাড়া অন্যান্য HTML ফাইল কমানো
            ls *.html 2>/dev/null | grep -v "index.html" | sort | head -n -365 | xargs -r rm
            cd ..
            
            git add rashifal/ cache/
            git commit -m "Daily rashifal update $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M')"
            
            # পুশ (রেট লিমিট এড়াতে retry)
            for i in {1..3}; do
              if git push; then
                echo "✅ পুশ সফল"
                break
              else
                echo "⚠️ পুশ ব্যর্থ, $i বার চেষ্টা..."
                sleep 5
                git pull --rebase
              fi
            done
          fi
          
      # 9. ব্যর্থ হলে সতর্কতা (ঐচ্ছিক – Telegram/Email)
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ রাশিফল জেনারেশন ব্যর্থ হয়েছে!"
          echo "Error: Generation failed at $(TZ='Asia/Kolkata' date)"
          # Telegram নোটিফিকেশন চাইলে নিচের অংশ আনকমেন্ট করুন
          # curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          #   -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          #   -d text="❌ MyAstrology Rashifal Generator Failed%0A⏰ $(TZ='Asia/Kolkata' date)%0A📁 ${{ github.repository }}"
          
      # 10. সাইটম্যাপ পিং (Google Search Console)
      - name: Ping search engines
        if: success()
        run: |
          # Google Search Console পিং
          curl -s "https://www.google.com/ping?sitemap=${SITE_URL}/sitemap-news.xml" || true
          curl -s "https://www.google.com/ping?sitemap=${SITE_URL}/sitemap-rashifal.xml" || true
          # Bing পিং
          curl -s "https://www.bing.com/ping?sitemap=${SITE_URL}/sitemap-rashifal.xml" || true
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://www.myastrology.in' }}

# ১১. রান টাইম মেট্রিক্স
env:
  GEN_DATE: ${{ github.event.inputs.date || 'auto' }}
