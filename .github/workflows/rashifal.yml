name: Rashifal Daily

on:
  schedule:
    - cron: '25 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
      - run: npm ci
      - run: mkdir -p rashifal cache
      - name: Generate
        run: cd src && node generate.js
        env:
          TZ: 'Asia/Kolkata'
      - name: Push
        run: |
          git config user.name "MyAstrology Bot"
          git config user.email "bot@myastrology.in"
          git add rashifal/ cache/
          git diff --cached --quiet && exit 0
          git commit -m "Rashifal update"
          git push origin main

