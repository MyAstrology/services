name: Fetch Google Reviews

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Reviews
        run: |
          curl -s "https://maps.googleapis.com/maps/api/place/details/json?place_id=ChIJ4TI9HgDF-DkRKpKfPRFp3-c&fields=name,rating,reviews,user_ratings_total&reviews_sort=most_relevant&key=${{ secrets.GOOGLE_PLACES_API_KEY }}" > reviews.json

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔄 Auto-update Google Reviews [skip ci]"
          git pull --rebase origin main
          git push origin main

