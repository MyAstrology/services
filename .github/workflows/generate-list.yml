name: Generate Blog & Sitemaps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # পুরো জবের জন্য বেস ডিরেক্টরি সেট করা হলো
    defaults:
      run:
        working-directory: services

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate blog list
        run: node src/content/blog/generate-list.js

      - name: Generate blog sitemap
        run: node src/content/blog/generate-sitemap.js

      - name: Generate image sitemap
        run: node src/content/blog/generate-image-sitemap.js

      - name: Generate video sitemap
        run: node src/content/blog/generate-video-sitemap.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # এখানে পাথগুলো সরাসরি দেয়া আছে কারণ আমরা অলরেডি 'services' ফোল্ডারের ভেতরে আছি
          git add src/content/blog/list.json public/my-sitemap.xml public/image-sitemap.xml public/video-sitemap.xml
          
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "Auto-update blog list and sitemaps [skip ci]"
          
          git pull --rebase origin main
          
          git push origin main
