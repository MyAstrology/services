name: Generate Blog & Sitemaps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd services && npm install

      - name: Generate blog list
        run: cd services && node src/content/blog/generate-list.js

      - name: Generate blog sitemap
        run: cd services && node src/content/blog/generate-sitemap.js

      - name: Generate image sitemap
        run: cd services && node src/content/blog/generate-image-sitemap.js

      - name: Generate video sitemap
        run: cd services && node src/content/blog/generate-video-sitemap.js

      - name: Commit and push changes
        run: |
          cd services
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add src/content/blog/list.json public/my-sitemap.xml public/image-sitemap.xml public/video-sitemap.xml

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Auto-update blog list and sitemaps [skip ci]"

          git pull --rebase origin main

          git push origin main
