name: Rashifal V3 Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (for canvas)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Create test directories
        run: mkdir -p rashifal-test cache

      - name: Generate Rashifal V3
        run: cd src && node generate.js
        env:
          TZ: 'Asia/Kolkata'
          OUTPUT_DIR: "../rashifal-test"

      - name: List generated files
        run: |
          echo "📁 Files in rashifal-test:"
          ls -la rashifal-test/
          echo ""
          echo "📄 Checking for 2026-04-01.html:"
          if [ -f "rashifal-test/2026-04-01.html" ]; then
            echo "✅ 2026-04-01.html created successfully"
            SIZE=$(wc -c < "rashifal-test/2026-04-01.html")
            echo "   Size: $SIZE bytes"
          else
            echo "❌ 2026-04-01.html not found"
          fi

      - name: Commit and Push test output
        run: |
          git config user.name "MyAstrology Test Bot"
          git config user.email "test-bot@myastrology.in"
          
          git add rashifal-test/
          
          if git diff --cached --quiet; then
            echo "📭 No changes to commit"
            exit 0
          fi
          
          DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d_%H-%M)
          git commit -m "test(v3): rashifal output $DATE"
          git push origin main

      - name: Summary
        run: |
          echo "## 🧪 Rashifal V3 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Generation | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          if [ -f "rashifal-test/2026-04-01.html" ]; then
            SIZE=$(wc -c < "rashifal-test/2026-04-01.html")
            echo "| 2026-04-01.html | Created ($SIZE bytes) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 2026-04-01.html | ❌ Not found |" >> $GITHUB_STEP_SUMMARY
          fi
