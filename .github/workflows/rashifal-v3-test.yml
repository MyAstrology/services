name: Daily Rashifal Generator

on:
  schedule:
    - cron: '30 0 * * *'   # UTC 00:30 = IST 06:00 (সকাল ৬টা)
  workflow_dispatch:
    inputs:
      date_override:
        description: 'তারিখ override (YYYY-MM-DD, খালি = আজকের তারিখ)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm install --no-audit --no-fund
          echo "✅ Dependencies installed"

      - name: Create rashifal directory
        run: mkdir -p rashifal

      - name: Set target date
        id: set_date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            TARGET="${{ github.event.inputs.date_override }}"
            echo "📅 Manual override: $TARGET"
          else
            # আজকের তারিখ পাস করুন, generate.js নিজেই আগামীকাল যোগ করবে
            TARGET=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
            echo "📅 Today IST: $TARGET"
          fi
          echo "TARGET_DATE=${TARGET}" >> $GITHUB_OUTPUT
          echo "TODAY_DATE=${TARGET}" >> $GITHUB_OUTPUT

      - name: Debug environment
        run: |
          echo "🔍 TARGET_DATE from workflow: ${{ steps.set_date.outputs.TARGET_DATE }}"
          echo "🔍 TODAY_DATE from workflow: ${{ steps.set_date.outputs.TODAY_DATE }}"

      - name: Generate daily rashifal
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
          TZ: 'Asia/Kolkata'
        run: |
          echo "🔮 Target: $TARGET_DATE"
          echo "📂 Current directory: $(pwd)"
          
          # Check if generator exists
          if [ ! -f "src/generate.js" ]; then
            echo "❌ ERROR: src/generate.js not found!"
            echo "📁 Available files in src:"
            ls -la src/
            exit 1
          fi
          
          echo "🔍 Generator found: src/generate.js"
          
          # Run generator
          set -e
          cd src
          node generate.js
          cd ..
          
          # Check if file was created
          echo ""
          echo "📁 rashifal/ contents after generation:"
          ls -la rashifal/ | head -20
          
          # Determine expected filename
          if [ -n "${{ steps.set_date.outputs.TARGET_DATE }}" ]; then
            EXPECTED_FILE="rashifal/${{ steps.set_date.outputs.TARGET_DATE }}.html"
          else
            EXPECTED_FILE="rashifal/$(TZ='Asia/Kolkata' date +%Y-%m-%d).html"
          fi
          
          echo "🔍 Expected file: $EXPECTED_FILE"
          
          if [ ! -f "$EXPECTED_FILE" ]; then
            echo "❌ FATAL: $EXPECTED_FILE তৈরি হয়নি!"
            echo ""
            echo "📁 All rashifal files:"
            ls -la rashifal/*.html 2>/dev/null || echo "No HTML files found"
            exit 1
          fi
          
          SIZE=$(wc -c < "$EXPECTED_FILE")
          echo "✅ $EXPECTED_FILE তৈরি হয়েছে (${SIZE} bytes)"

      - name: Update sitemap
        run: |
          if [ -f "src/update-sitemap.js" ]; then
            cd src && node update-sitemap.js && cd ..
            echo "✅ Sitemap updated"
          else
            echo "⚠️ update-sitemap.js not found, skipping"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          git status --short
          if git diff --quiet && git diff --staged --quiet && \
             [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ কোনো পরিবর্তন নেই"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ পরিবর্তন পাওয়া গেছে"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "MyAstrology Bot"
          
          # Add all rashifal files and sitemaps
          git add rashifal/ || true
          git add sitemap-*.xml 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit after all"
            exit 0
          fi
          
          git commit -m "📅 দৈনিক রাশিফল: ${TARGET_DATE} | MyAstrology Bot"
          
          # Push with retry logic
          for i in 1 2 3; do
            echo "🔄 Push attempt $i..."
            git pull origin main --rebase --strategy-option=ours && \
            git push origin main && break
            sleep 5
          done
          
          echo "🚀 Push সম্পন্ন"

      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: echo "ℹ️ ${TARGET_DATE}-এর রাশিফল আগেই তৈরি আছে"

      - name: Send failure notification
        if: failure() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ রাশিফল generation ব্যর্থ!\\n📅 ${TARGET_DATE}\\n🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK_URL" || true

      - name: Summary
        if: always()
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          echo "## 🔮 Daily Rashifal Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| বিষয় | তথ্য |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| তারিখ | ${TARGET_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | v20 LTS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ফাইল | rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://www.myastrology.in/rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          if [ -f "rashifal/${TARGET_DATE}.html" ]; then
            SIZE=$(wc -c < "rashifal/${TARGET_DATE}.html")
            echo "| সাইজ | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **সফলভাবে তৈরি হয়েছে**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **ফাইল তৈরি হয়নি**" >> $GITHUB_STEP_SUMMARY
          fi
