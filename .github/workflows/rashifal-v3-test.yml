name: Rashifal V3 Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
      - run: npm install --no-audit --no-fund
      - run: mkdir -p rashifal-v3 cache
      - name: Generate V3
        run: cd src && node generate.js
        env:
          TARGET_DATE: $(TZ='Asia/Kolkata' date -d tomorrow +%Y-%m-%d)
          TZ: 'Asia/Kolkata'
          OUTPUT_DIR: "../rashifal-v3"
      - name: Push test output
        run: |
          git config user.name "Test Bot"
          git config user.email "test@myastrology.in"
          git add rashifal-v3/
          git diff --cached --quiet && exit 0
          git commit -m "test: v3 output"
          git push origin main
