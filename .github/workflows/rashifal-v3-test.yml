name: Daily Rashifal

on:
  schedule:
    - cron: '30 0 * * *'   # UTC 00:30 = IST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential
      - run: npm install --no-audit --no-fund
      - run: mkdir -p rashifal cache
      - name: Generate
        run: cd src && node generate.js
        env:
          TZ: 'Asia/Kolkata'   # ← generate.js-এ এই ফ্ল্যাগ চেক করতে হবে
      - name: Push
        run: |
          git config user.name "MyAstrology Bot"
          git config user.email "bot@myastrology.in"
          git add rashifal/
          git add rashifal/*.xml rashifal/*.json rashifal/rss.xml 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "Rashifal: $(TZ='Asia/Kolkata' date +%Y-%m-%d)"
          git push origin main
