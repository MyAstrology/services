name: Daily Rashifal Generator

on:
  schedule:
    - cron: '25 18 * * *'   # রাত ১১:৫৫ IST
  workflow_dispatch:
    inputs:
      date_override:
        description: 'তারিখ override (YYYY-MM-DD, খালি = আগামীকাল)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # 20 LTS, stable

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm install --no-audit --no-fund
          echo "✅ Dependencies installed"

      - name: Create rashifal directory
        run: mkdir -p rashifal

      - name: Set target date
        id: set_date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            TARGET="${{ github.event.inputs.date_override }}"
            echo "📅 Manual override: $TARGET"
          else
            TARGET=$(TZ='Asia/Kolkata' date -d tomorrow +%Y-%m-%d)
            echo "📅 Tomorrow IST: $TARGET"
          fi
          echo "TARGET_DATE=${TARGET}" >> $GITHUB_OUTPUT

      - name: Generate daily rashifal
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          echo "🔮 Target: $TARGET_DATE"
          echo "📂 CWD: $(pwd)"
          echo "🔍 Generator: $(ls src/content/rashifal/generate-rashifal.js 2>/dev/null || echo 'NOT FOUND')"

          set -e
          node src/content/rashifal/generate-rashifal.js

          echo "📁 rashifal/ contents:"
          ls -la rashifal/

          if [ ! -f "rashifal/${TARGET_DATE}.html" ]; then
            echo "❌ FATAL: rashifal/${TARGET_DATE}.html তৈরি হয়নি!"
            echo "   Generator output-এ error আছে কিনা দেখুন।"
            exit 1
          fi
          SIZE=$(wc -c < "rashifal/${TARGET_DATE}.html")
          echo "✅ rashifal/${TARGET_DATE}.html তৈরি হয়েছে (${SIZE} bytes)"

      - name: Update news sitemap
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          set -e
          node src/content/rashifal/generate-news-sitemap.js
          echo "✅ sitemap-news.xml updated"

      - name: Generate RSS feed
        run: |
          node src/content/rashifal/generate-rss.js
          echo "✅ RSS feed generated"

      - name: Check for changes
        id: check_changes
        run: |
          git status --short
          if git diff --quiet && git diff --staged --quiet && \
             [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ কোনো পরিবর্তন নেই"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ পরিবর্তন পাওয়া গেছে"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "MyAstrology Bot"
          git add rashifal/${TARGET_DATE}.html rashifal/index.html sitemap-news.xml rashifal/rss.xml 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit after all"
            exit 0
          fi

          git commit -m "📅 দৈনিক রাশিফল: ${TARGET_DATE} | MyAstrology Bot"

          echo "🔄 Pulling latest changes..."
          git pull --rebase origin main || echo "⚠️ No changes to pull"

          git push origin HEAD
          echo "🚀 Push সম্পন্ন"

      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: echo "ℹ️ ${TARGET_DATE}-এর রাশিফল আগেই তৈরি আছে"

      - name: Send failure notification
        if: failure() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ রাশিফল generation ব্যর্থ!\\n📅 ${TARGET_DATE}\\n🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK_URL" || true

      - name: Summary
        if: always()
        env:
          TARGET_DATE: ${{ steps.set_date.outputs.TARGET_DATE }}
        run: |
          echo "## 🔮 Daily Rashifal Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| বিষয় | তথ্য |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| তারিখ | ${TARGET_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | v20 LTS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ফাইল | rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://www.myastrology.in/rashifal/${TARGET_DATE}.html |" >> $GITHUB_STEP_SUMMARY
          if [ -f "rashifal/${TARGET_DATE}.html" ]; then
            SIZE=$(wc -c < "rashifal/${TARGET_DATE}.html")
            echo "| সাইজ | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **সফলভাবে তৈরি হয়েছে**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **ফাইল তৈরি হয়নি**" >> $GITHUB_STEP_SUMMARY
          fi
