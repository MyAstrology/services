name: Generate Static Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**.md'
      - 'generate-posts.js'
      - 'generate-list.js'
      - 'generate-sitemap.js'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Generate static HTML posts ────────────────────────────
      - name: Generate blog HTML files
        run: node generate-posts.js

      # ── 4. Update blog list JSON ──────────────────────────────────
      - name: Update blog list
        run: node generate-list.js

      # ── 5. Update sitemaps ────────────────────────────────────────
      - name: Update sitemaps
        run: |
          node generate-sitemap.js
          if [ -f generate-image-sitemap.js ]; then node generate-image-sitemap.js; fi
          if [ -f generate-video-sitemap.js ]; then node generate-video-sitemap.js; fi

      # ── 6. Commit & push generated files ─────────────────────────
      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/*.html src/content/blog/list.json sitemap*.xml
          git diff --staged --quiet || git commit -m "Auto-generate blog posts & sitemaps [skip ci]"
          git push
