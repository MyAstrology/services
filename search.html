    /* ===== রুট ভেরিয়েবল (মূল সাইটের মতো) ===== */

    .search-header {

      border-radius: var(--r);
      padding: 30px;

    }

    .search-header h1 {

      font-size: 1.8rem;

      padding: 5px 15px;

      font-weight: 700;

      margin-top: 10px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      background: white;
      border-radius: 50px;
      border: 2px solid var(--border);
      overflow: hidden;
      margin-top: 20px;
    }
    .search-box input {
      flex: 1;
      padding: 15px 20px;
      border: none;
      font-size: 1rem;
      outline: none;
    }

      transition: transform 0.2s;

    .result-card:hover {
      transform: translateY(-3px);

    }

    .result-card h2 {
      font-family: var(--fh);

      font-size: 1.3rem;
      margin-bottom: 10px;
    }
    .result-card a {
      color: inherit;
      text-decoration: none;
    }
    .result-card a:hover h2 {
      color: var(--gold);
    }

    .result-meta {
      display: flex;
      gap: 15px;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 10px;
    }
    .result-meta i {

    .result-desc {

    .result-tags {

<!-- ===== মূল কন্টেন্ট ===== -->
<main>
  <div class="search-header">
    <h1>📚 লার্নিং হাব - অনুসন্ধান</h1>
    <p>আপনার প্রয়োজনীয় জ্যোতিষ, হস্তরেখা ও দর্শন বিষয় খুঁজুন</p>

      <button onclick="searchNow()"><i class="fas fa-search"></i> খুঁজুন</button>
    </div>
  </div>

  <div id="searchResults">
    <!-- ফলাফল জাভাস্ক্রিপ্ট দিয়ে দেখানো হবে -->
  </div>

<!-- ===== জাভাস্ক্রিপ্ট ===== -->
<script>
// নেভিগেশন ফাংশন
function toggleNav() {
  document.getElementById('navMenu').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('open');
}
function closeNav() {
  document.getElementById('navMenu').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('open');
}

// ব্লগ পোস্টের ডাটা (list.json থেকে নেওয়া)
const blogPosts = [
  // এই অংশটি generate-posts.js অটো জেনারেট করবে
  // এখানে list.json এর ডাটা আসবে
];

// URL থেকে কোয়েরি পড়া
function getQueryParam() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('q') || '';
}

// সার্চ ফাংশন
function performSearch(query) {
  if (!query) return [];
  
  query = query.toLowerCase();
  return blogPosts.filter(post => {
    return (
      (post.title && post.title.toLowerCase().includes(query)) ||
      (post.description && post.description.toLowerCase().includes(query)) ||
      (post.tags && post.tags.some(tag => tag.toLowerCase().includes(query))) ||
      (post.keywords && post.keywords.toLowerCase().includes(query))
    );
  });
}

// ফলাফল দেখানো
function displayResults() {
  const query = getQueryParam();
  document.getElementById('searchInput').value = query;
  
  const results = performSearch(query);
  const container = document.getElementById('searchResults');
  
  if (!query) {
    container.innerHTML = `
      <div class="no-results">
        <i class="fas fa-search"></i>
        <h2>কী খুঁজতে চান?</h2>
        <p>উপরে আপনার প্রয়োজনীয় বিষয় লিখুন</p>
        <div class="suggestions">
          <a href="?q=হস্তরেখা" class="suggestion-tag">✋ হস্তরেখা</a>
          <a href="?q=মঙ্গল দোষ" class="suggestion-tag">🔥 মঙ্গল দোষ</a>
          <a href="?q=কুণ্ডলী মিলন" class="suggestion-tag">💍 কুণ্ডলী মিলন</a>
          <a href="?q=জীবন দর্শন" class="suggestion-tag">🧠 জীবন দর্শন</a>
        </div>
      </div>
    `;
    return;
  }
  
  if (results.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <i class="fas fa-frown"></i>
        <h2>"${query}" এর কোনো ফলাফল পাওয়া যায়নি</h2>
        <p>অনুগ্রহ করে অন্য কীওয়ার্ড দিয়ে খুঁজুন</p>
        <div class="suggestions">
          <a href="?q=হস্তরেখা" class="suggestion-tag">✋ হস্তরেখা</a>
          <a href="?q=মঙ্গল" class="suggestion-tag">🔥 মঙ্গল</a>
          <a href="?q=পিতৃদোষ" class="suggestion-tag">👴 পিতৃদোষ</a>
        </div>
      </div>
    `;
    return;
  }
  
  let html = `<div class="result-stats">${results.length}টি ফলাফল পাওয়া গেছে</div>`;
  
  results.forEach(post => {
    html += `
      <div class="result-card">
        <h2><a href="/blog/${post.slug}.html">${post.title}</a></h2>
        <div class="result-meta">
          <span><i class="far fa-calendar-alt"></i> ${post.date || ''}</span>
          <span><i class="far fa-clock"></i> ${post.reading_time || '৫'} মিনিট</span>
        </div>
        <div class="result-desc">${post.description || ''}</div>
        <div class="result-tags">
          ${(post.tags || []).map(tag => `<span class="result-tag">#${tag}</span>`).join('')}
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

// সার্চ বাটন
function searchNow() {
  const query = document.getElementById('searchInput').value.trim();
  if (query) {
    window.location.href = `?q=${encodeURIComponent(query)}`;
  }
}

// এন্টার কী
document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchNow();
});

// পেজ লোড হলে ফলাফল দেখাও
displayResults();
</script>
