<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি দৈনিক রাশিফল - MyAstrology রানাঘাট</title>
</head>
<body style="font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5;">
    
    <div style="text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <h1 style="color: #ff6b35; margin-bottom: 10px;">🌟 আজকের রাশিফল</h1>
        <p style="color: #666; font-size: 18px;">২৬ ফেব্রুয়ারি ২০২৬</p>
        
        <div style="margin: 30px 0;">
            <select id="rashi" style="padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #ff6b35; width: 100%; max-width: 300px; background: white;">
                <option value="">📍 আপনার রাশি নির্বাচন করুন</option>
                <option value="mesha">♈ মেষরাশি</option>
                <option value="brisha">♉ বৃষরাশি</option>
                <option value="mithun">♊ মিথুনরাশি</option>
                <option value="karkat">♋ কর্কটরাশি</option>
                <option value="singha">♌ সিংহরাশি</option>
                <option value="kanya">♍ কন্যারাশি</option>
                <option value="tula">♎ তুলারাশি</option>
                <option value="brischik">♏ বৃশ্চিকরাশি</option>
                <option value="dhanu">♐ ধনুরাশি</option>
                <option value="makar">♑ মকররাশি</option>
                <option value="kumbha">♒ কুম্ভরাশি</option>
                <option value="meen">♓ মীনরাশি</option>
            </select>
            <br><br>
            <button onclick="showRashifal()" 
                style="background: linear-gradient(45deg, #ff6b35, #f7931e); color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,107,53,0.4);">
                ✨ রাশিফল দেখুন ✨
            </button>
        </div>
        
        <div id="result" style="display: none;"></div>
    </div>

    <!-- WhatsApp CTA -->
    <div style="text-align: center; margin-top: 30px; padding: 20px; background: #25D366; color: white; border-radius: 15px;">
        <h3>বিস্তারিত পরামর্শ চান?</h3>
        <a href="https://wa.me/919333122768" target="_blank" 
           style="color: white; text-decoration: none; font-weight: bold;">
           📱 এখনই WhatsApp-এ কথা বলুন
        </a>
    </div>

    <script>
        // প্রতি রাশির আলাদা আজকের রাশিফল (২৬ ফেব্রুয়ারি)
        const rashifalData = {

                prem: "প্রেমজীবনে রোমান্স। পার্টনারের সাথে সময় কাটান 💕",
                swasthya: "শক্তি ও উৎসাহ ভালো। ব্যায়াম করুন 🏋️"

                karma: "ব্যবসায় লাভের সম্ভাবনা। বিনিয়োগ ভালো সময় 🤑",
                prem: "প্রেমের সম্পর্ক মধ্যম। ধৈর্য ধরুন ❤️",
                swasthya: "পেটের সমস্যা থেকে সাবধান। হালকা খাবার খান 🍲"
            },
            mithun: {
                karma: "চাকরিতে সহকর্মীর সাহায্য পাবেন। টিমওয়ার্ক করুন 🤝",
                prem: "প্রেমে রোমান্টিক তারিখ রাখুন 🌹",
                swasthya: "শরীর একদম ফিট। বাইরে ঘুরতে যান 🚶"
            },
            karkat: {
                karma: "কর্মে ছোট চ্যালেঞ্জ। শেষে সাফল্য আসবে 💪",
                prem: "পারিবারিক জীবনে সুখের খবর 👨‍👩‍👧",

                prem: "প্রেমে আকর্ষণ বাড়বে। নতুন সম্পর্কের সম্ভাবনা 🔥",
                swasthya: "শক্তি প্রচুর। সারাদিন এনার্জেটিক থাকবেন ⚡"
            },
            kanya: {
                karma: "বিস্তারিত কাজে মন দিন। বসের প্রশংসা পাবেন 📈",
                prem: "সম্পর্ক স্থিতিশীল। একসাথে প্ল্যান করুন 💑",
                swasthya: "ডায়েট মেনে চলুন। স্বাস্থ্য ভালো 🍎"
            },
            tula: {
                karma: "টিমওয়ার্কে সাফল্য। সবার সাথে সহযোগিতা করুন 👥",
                prem: "প্রেমে সুখের খবর আসতে পারে 💌",
                swasthya: "শরীর ঠিক আছে। হালকা ব্যায়াম করুন 🧘"
            },
            brischik: {
                karma: "কঠোর পরিশ্রমের ফল পাবেন। ধৈর্য ধরুন 💎",
                prem: "প্রেমে আবেগ নিয়ন্ত্রণ করুন। কথা বলুন 💬",
                swasthya: "স্বাস্থ্যের দিকে নজর দিন। ওষুধ খেয়ে থাকুন 💊"
            },
            dhanu: {
                karma: "নতুন প্রকল্প শুরু করার ভালো সময় 🚀",
                prem: "প্রেমজীবন উত্তেজনাপূর্ণ। অ্যাডভেঞ্চার করুন 🎢",
                swasthya: "শক্তি ও উৎসাহ প্রচুর ⚡"
            },
            makar: {
                karma: "কর্মে স্থিতিশীলতা। লক্ষ্যের দিকে এগোন 🏆",
                prem: "প্রেমে গভীরতা আসবে। গুরুত্বপূর্ণ কথা বলুন 💭",
                swasthya: "স্বাস্থ্য সুস্থ। নিয়ম মেনে চলুন ✅"
            },
            kumbha: {
                karma: "উদ্ভাবনী চিন্তা করুন। নতুন আইডিয়া কাজে লাগবে 💡",
                prem: "প্রেমে বন্ধন মজবুত হবে 🔗",
                swasthya: "শরীর ভালো চলবে। মন শান্ত রাখুন 🧠"
            },
            meen: {
                karma: "ক্রিয়েটিভ কাজে সাফল্য। শিল্পী মন প্রকাশ করুন 🎨",
                prem: "রোমান্টিক মুহূর্ত কাটাবেন 🌅",
                swasthya: "ঘুমানোর সময় বাড়ান। বিশ্রাম জরুরি 😴"

        };

        function showRashifal() {
            const rashi = document.getElementById('rashi').value;
            
            // রাশি সিলেক্ট না করলে warning
            if (!rashi) {
                alert('📍 দয়া করে আপনার রাশি নির্বাচন করুন!');
                return;
            }

            const data = rashifalData[rashi];
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 20px; margin-top: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: left;">
                    <h2 style="margin: 0 0 25px 0; text-align: center; font-size: 28px;">✨ ${rashi.toUpperCase()} রাশি ✨</h2>
                    
                    <div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                        <h3 style="color: #FFD700; margin: 0 0 10px 0;">💼 কর্ম</h3>
                        <p style="font-size: 16px; line-height: 1.5;">${data.karma}</p>
                    </div>
                    
                    <div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                        <h3 style="color: #FF69B4; margin: 0 0 10px 0;">💕 প্রেম</h3>
                        <p style="font-size: 16px; line-height: 1.5;">${data.prem}</p>
                    </div>
                    
                    <div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 15px;">
                        <h3 style="color: #00FF7F; margin: 0 0 10px 0;">🏥 স্বাস্থ্য</h3>
                        <p style="font-size: 16px; line-height: 1.5;">${data.swasthya}</p>
                    </div>
                    
                   
                </div>
            `;
        }
    </script>
    <!-- পঞ্জিকা সেকশন -->
<div id="panchang-section" style="margin-top: 40px; padding: 25px; background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);">
  <h3 style="color: #856404; text-align: center; margin-bottom: 20px;">📅 <strong>আজকের পঞ্জিকা</strong></h3>
  <div id="panchang-loading" style="text-align: center; color: #856404;">
    লোড হচ্ছে... ⏳
  </div>
  <div id="panchang-data" style="display: none;"></div>
</div>

<script>
// Prokerala Demo API (CORS Proxy দিয়ে)
async function loadPanchang() {
  try {
    const response = await fetch('https://api.allorigins.win/get?url=' + 
      encodeURIComponent('https://api.prokerala.com/demo/panchang.php?date=2026-02-26'));
    
    const data = await response.json();
    const panchang = JSON.parse(data.contents);
    
    document.getElementById('panchang-loading').style.display = 'none';
    document.getElementById('panchang-data').style.display = 'block';
    document.getElementById('panchang-data').innerHTML = `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; font-size: 15px;">
        <div style="background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; text-align: center;">
          <strong>তিথি</strong><br>${panchang.tithi?.name || 'N/A'}
        </div>
        <div style="background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; text-align: center;">
          <strong>নক্ষত্র</strong><br>${panchang.nakshatra?.name || 'N/A'}
        </div>
        <div style="background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; text-align: center;">
          <strong>যোগ</strong><br>${panchang.yoga?.name || 'N/A'}
        </div>
        <div style="background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; text-align: center;">
          <strong>করণ</strong><br>${panchang.karana?.name || 'N/A'}
        </div>
        <div style="background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; text-align: center;">
          <strong>সূর্যোদয়</strong><br>${panchang.sunrise || 'N/A'}
        </div>
      </div>
      <p style="text-align: center; color: #856404; font-size: 12px; margin-top: 15px;">
        সূত্র: Prokerala Astrology API
      </p>
    `;
  } catch (error) {
    document.getElementById('panchang-loading').innerHTML = 'পঞ্জিকা লোড করতে সমস্যা হচ্ছে 😅';
  }
}

// Page load হলে Panchang লোড করুন
window.onload = loadPanchang;
</script>
</body>
</html>
