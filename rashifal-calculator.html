<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাশিফল</title>
    <style>
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .rashi-box {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .rashi-box::before {
            content: '🦀';
            font-size: 40px;
            position: absolute;
            top: 10px;
            right: 15px;
        }
        .rashi-name {
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin: 0;
        }
        .english-name {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            margin-top: 5px;
        }
        /* Extra styling for other rashi boxes if needed */
        .other-rashi {
            background: linear-gradient(135deg, #48dbfb, #0abde3);
            margin-top: 15px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>বাংলা রাশিফল</h1>
        
        <!-- করকট রাশি বক্স -->
        <div class="rashi-box">
            <h2 class="rashi-name">কর্কট রাশি</h2>
            <p class="english-name">Cancer Rashi</p>
        </div>
        
        <!-- অন্যান্য রাশির উদাহরণ, যেমন মেষ -->
        <div class="rashi-box other-rashi">
            <h2 class="rashi-name">মেষ রাশি</h2>
            <p class="english-name">Mesh Rashi</p>
        </div>
    </div>
</body>
</html>
