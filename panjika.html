<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>আজকের পঞ্জিকা - MyAstrology</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fffaf0; text-align: center; padding: 20px; }
        .panjika-card { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; border: 2px solid #e67e22; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #d35400; font-size: 22px; }
        .info { font-size: 18px; margin: 15px 0; padding: 10px; background: #fff5e6; border-radius: 8px; color: #333; }
    </style>
</head>
<body>
    <div class="panjika-card">
        <h1>আজকের বাংলা পঞ্জিকা (রানাঘাট)</h1>
        <div id="panchang-data">তথ্য লোড হচ্ছে...</div>
        <p style="font-size: 12px; color: #777;">© ২০২৬ MyAstrology - রানাঘাট</p>
    </div>

    <script>
        // আপনার ছবি (1000164291.jpg) থেকে পাওয়া আইডিগুলো এখানে বসানো হয়েছে
        const clientId = '10f0df3a-365a-41bb-b788-bc5e89b7a463'; 
        const clientSecret = 'v9c2UZyfpCmy22egcLEFiC78ysT9bqwGP0ayqXQm';

        async function getPanjika() {
            try {
                // ১. টোকেন সংগ্রহ
                const authRes = await fetch('https://api.prokerala.com/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `grant_type=client_credentials&client_id=${clientId}&client_secret=${clientSecret}`
                });
                const auth = await authRes.json();

                // ২. বাংলা পঞ্জিকা ডেটা সংগ্রহ (la=bn প্যারামিটার ব্যবহার করে)
                const res = await fetch('https://api.prokerala.com/v2/astrology/panchang?location=23.18,88.56&datetime=2026-02-24T12:00:00+05:30&la=bn', {
                    headers: { 'Authorization': `Bearer ${auth.access_token}` }
                });
                const result = await res.json();
                const p = result.data.panchang;

                // ৩. স্ক্রিনে ডেটা দেখানো
                document.getElementById('panchang-data').innerHTML = `
                    <div class="info"><b>তিথি:</b> ${p.tithi[0].name}</div>
                    <div class="info"><b>নক্ষত্র:</b> ${p.nakshatra[0].name}</div>
                    <div class="info"><b>সূর্যোদয়:</b> ${p.sunrise}</div>
                    <div class="info"><b>সূর্যাস্ত:</b> ${p.sunset}</div>
                `;
            } catch (err) {
                document.getElementById('panchang-data').innerHTML = "দুঃখিত, তথ্য লোড করা যায়নি। ডোমেইনটি পুনরায় যাচাই করুন।";
            }
        }
        getPanjika();
    </script>
</body>
</html>
