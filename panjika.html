<div id="panchang-output">
  Panchang data লোড হচ্ছে...
</div>

<script>

async function loadPanchang() {
  const el = document.getElementById("panchang-container");
  el.innerText = "লোড হচ্ছে...";

  try {
    const res = await fetch("https://panchang-api.bipulbala64.workers.dev/");
    const json = await res.json();

    // এখন আমরা শুধু একটি উদাহরণ দেখাচ্ছি
    const vaara = json.data.vaara;
    const sunrise = json.data.sunrise;
    const sunset = json.data.sunset;

    el.innerHTML = `
      <p>আজকের দিন: ${vaara}</p>
      <p>সূর্যোদয়: ${sunrise}</p>
      <p>সূর্যাস্ত: ${sunset}</p>
    `;
  } catch (err) {
    el.innerText = "Panchang data লোড হয়নি। পরে চেষ্টা করুন।";
    console.error(err);
  }
}

window.addEventListener("load", loadPanchang);

<div id="panchang-container">লোড হচ্ছে...</div>

  
async function loadPanchang() {
  try {
    const res = await fetch("https://panchang-api.bipulbala64.workers.dev/");
    const json = await res.json();

    if (json.status !== "ok") {
      document.getElementById("panchang-output").innerText = "Panchang data লোড হয়নি। পরে চেষ্টা করুন।";
      return;
    }

    const data = json.data;

    // ==============================
    // ১) আজকের Vaara (weekday)
    // ==============================
    const vaara = data.vaara;

    // ==============================
    // ২) তিথি
    // ==============================
    const tithiList = data.tithi.map(t => `
      ${t.name} (${t.paksha}) 
      <br> শুরু: ${new Date(t.start).toLocaleTimeString("bn-IN", {hour:"2-digit",minute:"2-digit"})} 
      - শেষ: ${new Date(t.end).toLocaleTimeString("bn-IN", {hour:"2-digit",minute:"2-digit"})}
    `).join("<br><br>");

    // ==============================
    // ৩) নক্ষত্র
    // ==============================
    const nakshatraList = data.nakshatra.map(n => `
      ${n.name} (প্রভু: ${n.lord.vedic_name}) 
      <br> শুরু: ${new Date(n.start).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})} 
      - শেষ: ${new Date(n.end).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})}
    `).join("<br><br>");

    // ==============================
    // ৪) কারণ
    // ==============================
    const karanaList = data.karana.map(k => `
      ${k.name} 
      <br> শুরু: ${new Date(k.start).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})} 
      - শেষ: ${new Date(k.end).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})}
    `).join("<br><br>");

    // ==============================
    // ৫) যোগ
    // ==============================
    const yogaList = data.yoga.map(y => `
      ${y.name} 
      <br> শুরু: ${new Date(y.start).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})} 
      - শেষ: ${new Date(y.end).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"})}
    `).join("<br><br>");

    // ==============================
    // ৬) সূর্য/চাঁদ
    // ==============================
    const sunrise = new Date(data.sunrise).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"});
    const sunset = new Date(data.sunset).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"});
    const moonrise = new Date(data.moonrise).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"});
    const moonset = new Date(data.moonset).toLocaleTimeString("bn-IN",{hour:"2-digit",minute:"2-digit"});

    // ==============================
    // ৭) HTML তৈরি
    // ==============================
    const html = `
      <h3>আজকের পঞ্জিকা</h3>
      <b>বার:</b> ${vaara} <br><br>

      <b>তিথি:</b><br> ${tithiList} <br><br>

      <b>নক্ষত্র:</b><br> ${nakshatraList} <br><br>

      <b>কারণ:</b><br> ${karanaList} <br><br>

      <b>যোগ:</b><br> ${yogaList} <br><br>

      <b>সূর্যোদয়:</b> ${sunrise} <br>
      <b>সূর্যাস্ত:</b> ${sunset} <br>
      <b>চন্দ্রোদয়:</b> ${moonrise} <br>
      <b>চন্দ্রাস্ত:</b> ${moonset} <br>
    `;

    document.getElementById("panchang-output").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("panchang-output").innerText = "Panchang data লোড হয়নি। পরে চেষ্টা করুন।";
  }
}

// Load immediately
loadPanchang();
</script>
