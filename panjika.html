<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আজকের পঞ্জিকা</title>
  <style>
    body { font-family: "Noto Sans Bengali", sans-serif; background: #fff7e6; color: #333; padding: 20px; }
    h2, h3 { color: #d35400; }
    .panchang-section { margin-bottom: 20px; }
    ul { padding-left: 20px; }
    li { margin-bottom: 5px; }
  </style>
</head>
<body>

  <h2>আজকের পঞ্জিকা</h2>
  <div id="panchang-output">
    <p>লোড হচ্ছে…</p>
  </div>

  <script>
    const WORKER_URL = "https://panchang-api.bipulbala64.workers.dev/";

    async function loadPanchang(lat, lon) {
      let url = WORKER_URL;
      if(lat && lon) url += `?lat=${lat}&lon=${lon}`;

      try {
        const res = await fetch(url);
        const json = await res.json();
        const p = json.data;

        // Bengali Vaara mapping
        const vaaraMap = {
          "Sunday":"রবিবার", "Monday":"সোমবার", "Tuesday":"মঙ্গলবার",
          "Wednesday":"বুধবার","Thursday":"বৃহস্পতিবার",
          "Friday":"শুক্রবার","Saturday":"শনিবার"
        };
        const vaara = vaaraMap[p.vaara] || p.vaara;

        // Helper: ISO date to Bengali time
        const timeBN = t => new Date(t).toLocaleTimeString('bn-IN', {hour12:false});

        // Render HTML
        let html = `
          <div class="panchang-section">
            <p><strong>দিন:</strong> ${vaara}</p>
            <p><strong>সূর্যোদয়:</strong> ${timeBN(p.sunrise)}</p>
            <p><strong>সূর্যাস্ত:</strong> ${timeBN(p.sunset)}</p>
            <p><strong>চন্দ্রোদয়:</strong> ${timeBN(p.moonrise)}</p>
            <p><strong>চন্দ্রাস্ত:</strong> ${timeBN(p.moonset)}</p>
          </div>
          <div class="panchang-section">
            <h3>তিথি:</h3>
            <ul>
              ${p.tithi.map(t => `<li>${t.name} (${t.paksha}) : ${timeBN(t.start)} - ${timeBN(t.end)}</li>`).join('')}
            </ul>
          </div>
          <div class="panchang-section">
            <h3>নক্ষত্র:</h3>
            <ul>
              ${p.nakshatra.map(n => `<li>${n.name} (${n.lord.vedic_name}) : ${timeBN(n.start)} - ${timeBN(n.end)}</li>`).join('')}
            </ul>
          </div>
          <div class="panchang-section">
            <h3>করণ:</h3>
            <ul>
              ${p.karana.map(k => `<li>${k.name} : ${timeBN(k.start)} - ${timeBN(k.end)}</li>`).join('')}
            </ul>
          </div>
          <div class="panchang-section">
            <h3>যোগ:</h3>
            <ul>
              ${p.yoga.map(y => `<li>${y.name} : ${timeBN(y.start)} - ${timeBN(y.end)}</li>`).join('')}
            </ul>
          </div>
        `;
        document.getElementById("panchang-output").innerHTML = html;

      } catch(err) {
        console.error(err);
        document.getElementById("panchang-output").innerHTML = "<p>Panchang data লোড হয়নি। পরে চেষ্টা করুন।</p>";
      }
    }

    // Try geolocation
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude.toFixed(2);
        const lon = pos.coords.longitude.toFixed(2);
        loadPanchang(lat, lon);
      }, err => {
        // fallback Ranaghat
        loadPanchang();
      });
    } else {
      loadPanchang(); // fallback Ranaghat
    }

  </script>

</body>
</html>
