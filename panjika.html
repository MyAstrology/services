function fmtTime(h,m){
  m=((m%60)+60)%60; if(m===60){h++;m=0;} h=((h%24)+24)%24;
  const l=h<6?'রাত':h<12?'সকাল':h<17?'দুপুর':h<20?'সন্ধ্যা':'রাত';

  return `${l} ${toBn(hh)}:${String(m).padStart(2,'0').replace(/[0-9]/g,d=>BD[+d])}`;
}

function slot(rise,set,s){
  const len=(set-rise)/8,st=rise+len*(s-1),en=st+len;
  const sh=Math.floor(st),sm=Math.round((st-sh)*60);
  const eh=Math.floor(en),em=Math.round((en-eh)*60);

function getFests(ds){return festivals.filter(f=>f.d===ds);}

function getBnDate(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  const b=[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,17],[11,16],[12,16],[1,15],[2,13],[3,14]];
  let mi=0;
  for(let i=0;i<12;i++){const[bm,bd]=b[i];if(m===bm){mi=d>=bd?i:(i+11)%12;break;}if(i===11)mi=11;}
  const[bm,bd]=b[mi];
  let dy=m===bm?d-bd+1:d+(new Date(m<=b[(mi+11)%12][0]?y-1:y,b[(mi+11)%12][0]-1+1,0).getDate()-b[(mi+11)%12][1]+1);
  if(dy<=0)dy=1;if(dy>32)dy=32;
  let yr=y-593;if(m<4||(m===4&&d<14))yr--;
  return{day:dy,month:mi,year:yr};
}

function calc(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate(),w=date.getDay();
  const JD=jd(y,m,d)+0.5;
  const sl=sunL(JD),ml=moonL(JD);
  const st=sunTimes(JD);
  const diff=((ml-sl)+360)%360;
  const tN=Math.floor(diff/12)+1;
  const nI=Math.floor((ml/360)*27)%27;
  const yI=Math.floor(((sl+ml)%360)/(360/27))%27;
  const kI=Math.floor(diff/6)%11;
  const bn=getBnDate(date);
  const sh=Math.floor(st.rise),sm=Math.round((st.rise-sh)*60);
  const eh=Math.floor(st.set), em=Math.round((st.set-eh)*60);
  const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return{
    bn,w,tN,tName:tNames[tN-1],
    paksha:tN<=15?'শুক্লপক্ষ':'কৃষ্ণপক্ষ',pakDay:tN<=15?tN:tN-15,
    nak:naks[nI],yoga:yogas[yI],karan:karans[kI],
    vara:varaDays[w],varaL:varaL[w],
    rise:{h:sh,m:sm},set:{h:eh,m:em},st,
    rahu:slot(st.rise,st.set,rahuS[w]),
    gulika:slot(st.rise,st.set,guliS[w]),
    yam:slot(st.rise,st.set,yamS[w]),
    abhi:abhi(st.rise,st.set),
    fests:getFests(ds),ds,
    vikram:bn.year+57,saka:bn.year-78,ritu:ritus[bn.month],
  };
}

function moonEmoji(t){
  return t<=2?'🌑':t<=5?'🌒':t<=8?'🌓':t<=12?'🌔':t===15?'🌕':t<=19?'🌖':t<=22?'🌗':t<=26?'🌘':'🌑';
}

// ── HEADER ──────────────────────────────────────
const TODAY=new Date(), TODAYSTR=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;

function renderHeader(){
  const p=calc(TODAY);
  document.getElementById('hdr-bn').textContent=`${toBn(p.bn.day)} ${bnMonths[p.bn.month]}, ${toBn(p.bn.year)} বঙ্গাব্দ`;
  document.getElementById('hdr-en').textContent=`${TODAY.getDate()} ${enMo[TODAY.getMonth()]} ${TODAY.getFullYear()} — ${p.vara}`;
  document.getElementById('hdr-badges').innerHTML=
    `<div class="tbadge">${moonEmoji(p.tN)} ${p.paksha}</div>
     <div class="tbadge">⭐ ${p.nak[0]}</div>
     <div class="tbadge">☯ ${p.yoga[0]}</div>
     <div class="tbadge">🌅 ${fmtTime(p.rise.h,p.rise.m)}</div>`;
}

// ── CALENDAR ────────────────────────────────────
let calY,calM;

function renderCal(y,m){
  calY=y;calM=m;
  const first=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  const bnMid=getBnDate(new Date(y,m,15));
  document.getElementById('cal-title').textContent=
    `${enMo[m]} ${y} — ${bnMonths[bnMid.month]} – ${bnMonths[(bnMid.month+1)%12]} ${toBn(bnMid.year)}`;

  const grid=document.getElementById('cal-days');
  grid.innerHTML='';

  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}

  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d),w=date.getDay();
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const p=calc(date);
    const fests=getFests(ds), isToday=ds===TODAYSTR;

    const el=document.createElement('div');
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(w===0)cls+=' sun-col';
    if(w===6)cls+=' sat-col';
    el.className=cls; el.dataset.date=ds;

    el.innerHTML=`
      ${isToday?'<div class="today-dot"></div>':''}
      <div class="day-en">${toBnF(d)}</div>
      <div class="day-bn">${toBn(p.bn.day)} ${bnMonths[p.bn.month].slice(0,3)}.</div>
      <div class="day-tithi">${p.tName}</div>
      ${fests.length?`<div class="day-festival">${fests[0].i} ${fests[0].n.split('–')[0].split('/')[0].trim()}</div>`:''}
    `;
    el.addEventListener('click',()=>showDetail(date));
    grid.appendChild(el);
  }
}

  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.cal-day.selected').forEach(e=>e.classList.remove('selected'));
}
