<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        #panchang-output {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            line-height: 1.6;
            background-color: #f9f9f9;
        }
        .panchang-section { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .panchang-title { color: #d35400; font-weight: bold; }
        .time-text { font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

<div id="panchang-output">পঞ্জিকা তথ্য লোড হচ্ছে...</div>

<script>
async function loadPanchang() {
    const outputEl = document.getElementById("panchang-output");

    try {
        const res = await fetch("https://panchang-api.bipulbala64.workers.dev/");
        const json = await res.json();

        if (json.status !== "ok") {
            outputEl.innerText = "দুঃখিত, তথ্য পাওয়া যায়নি।";
            return;
        }

        const data = json.data;
        const formatTime = (isoString) => 
            new Date(isoString).toLocaleTimeString("bn-IN", { hour: "2-digit", minute: "2-digit" });

        // Helper to format lists (Tithi, Nakshatra, etc.)
        const formatList = (list) => list.map(item => `
            <div>
                <strong>${item.name}</strong> ${item.paksha ? `(${item.paksha})` : ''}
                ${item.lord ? `<br><small>প্রভু: ${item.lord.vedic_name}</small>` : ''}
                <div class="time-text">শুরু: ${formatTime(item.start)} - শেষ: ${formatTime(item.end)}</div>
            </div>
        `).join("");

        // Construct HTML
        outputEl.innerHTML = `
            <h2 style="margin-top:0;">আজকের পঞ্জিকা</h2>
            <div class="panchang-section">
                <span class="panchang-title">বার:</span> ${data.vaara}
            </div>
            
            <div class="panchang-section">
                <span class="panchang-title">তিথি:</span><br> ${formatList(data.tithi)}
            </div>

            <div class="panchang-section">
                <span class="panchang-title">নক্ষত্র:</span><br> ${formatList(data.nakshatra)}
            </div>

            <div class="panchang-section">
                <span class="panchang-title">সূর্য ও চন্দ্র:</span><br>
                ☀️ সূর্যোদয়: ${formatTime(data.sunrise)} | সূর্যাস্ত: ${formatTime(data.sunset)} <br>
                🌙 চন্দ্রোদয়: ${formatTime(data.moonrise)} | চন্দ্রাস্ত: ${formatTime(data.moonset)}
            </div>
        `;

    } catch (err) {
        console.error("Error fetching Panchang:", err);
        outputEl.innerText = "নেটওয়ার্ক সমস্যা। পরে চেষ্টা করুন।";
    }
}

// Execute on load
window.addEventListener("DOMContentLoaded", loadPanchang);
</script>

</body>
</html>
