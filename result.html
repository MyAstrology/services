<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>বিশ্লেষণ ফলাফল | Numerology Intelligence Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .result-card, .clarification-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .result-header { text-align: center; margin-bottom: 30px; }
        .result-number { display: inline-block; background: linear-gradient(135deg, #ffd700, #ff8c00); padding: 20px 35px; border-radius: 60px; margin-bottom: 20px; }
        .big-number { font-size: 64px; font-weight: 800; color: #1a1a2e; }
        .planet-badge { background: rgba(255,215,0,0.3); padding: 8px 20px; border-radius: 40px; display: inline-block; margin-top: 10px; font-size: 16px; }
        .result-title { font-size: 28px; margin-bottom: 10px; }
        .result-subtitle { opacity: 0.8; font-size: 18px; }
        .info-section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-section h3 { color: #ffd700; margin-bottom: 12px; font-size: 22px; }
        .info-section h3 i { margin-right: 10px; }
        .info-section p { line-height: 1.8; opacity: 0.9; font-size: 16px; text-align: justify; }
        .badge { display: inline-block; background: rgba(255,215,0,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-right: 10px; margin-bottom: 10px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); padding: 12px 25px; border-radius: 40px; color: white; text-decoration: none; transition: all 0.3s; margin-top: 20px; }
        .back-btn:hover { background: rgba(255,215,0,0.3); gap: 12px; }
        .share-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .share-btn { background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: all 0.3s; border: none; color: white; font-family: inherit; font-size: 14px; }
        .share-btn:hover { background: rgba(255,215,0,0.4); }
        .loading { text-align: center; padding: 50px; }
        .loading i { font-size: 48px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .clarification-card { text-align: center; }
        .option-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 30px 0; max-height: 450px; overflow-y: auto; padding: 10px; }
        .option-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; border: none; padding: 10px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        .root-description { background: rgba(255,215,0,0.15); border-radius: 20px; padding: 20px; margin-bottom: 25px; border-left: 4px solid #ffd700; }
        @media (max-width: 768px) {
            .result-card, .clarification-card { padding: 20px; }
            .big-number { font-size: 48px; }
            .result-title { font-size: 22px; }
            .option-btn { padding: 8px 14px; font-size: 12px; }
            .info-section p { font-size: 14px; }
        }

</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <i class="fas fa-spinner"></i>
            <p>বিশ্লেষণ করা হচ্ছে...</p>
        </div>
        <div id="resultContent" style="display: none;"></div>
        <div style="text-align: center; margin-top: 30px;">
            <a href="numerology.html" class="back-btn"><i class="fas fa-arrow-left"></i> নতুন অনুসন্ধান</a>
        </div>
    </div>

    <script src="js/numerology-data.js"></script>
    
    <script>
        let currentRawInput = '';
        let currentNumberData = null;
        
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        // অক্ষর-সংখ্যা ম্যাপিং
        const letterValues = {
            'a':1,'b':2,'c':3,'d':4,'e':5,'f':6,'g':7,'h':8,'i':9,
            'j':1,'k':2,'l':3,'m':4,'n':5,'o':6,'p':7,'q':8,'r':9,
            's':1,'t':2,'u':3,'v':4,'w':5,'x':6,'y':7,'z':8,
            'অ':1,'আ':2,'ই':3,'ঈ':4,'উ':5,'ঊ':6,'ঋ':7,'এ':8,'ঐ':9,
            'ও':1,'ঔ':2,'ক':1,'খ':2,'গ':3,'ঘ':4,'ঙ':5,
            'চ':6,'ছ':7,'জ':8,'ঝ':9,'ঞ':1,'ট':2,'ঠ':3,'ড':4,'ঢ':5,'ণ':6,
            'ত':7,'থ':8,'দ':9,'ধ':1,'ন':2,'প':3,'ফ':4,'ব':5,'ভ':6,'ম':7,
            'য':8,'র':9,'ল':1,'শ':2,'ষ':3,'স':4,'হ':5,'ড়':9,'ঢ়':1,'য়':2,
            'ং':3,'ঃ':4,'ঁ':5
        };
        
        function extractNumberFromInput(input) {
            if (!input || input.trim() === "") return null;
            
            const bengaliDigits = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
            let converted = input;
            for (let [b, e] of Object.entries(bengaliDigits)) {
                converted = converted.replace(new RegExp(b, 'g'), e);
            }
            
            const digits = converted.match(/[0-9]/g);
            let sum = 0;
            if (digits && digits.length > 0) {
                for (let d of digits) sum += parseInt(d);
            }
            
            const lowerInput = input.toLowerCase();
            let letterSum = 0;
            for (let char of lowerInput) {
                if (letterValues[char]) {
                    letterSum += letterValues[char];
                }
            }
            
            let totalSum = sum + letterSum;
            if (totalSum === 0) {
                for (let i = 0; i < input.length; i++) {
                    totalSum += input.charCodeAt(i);
                }
            }
            
            let rootNumber = totalSum;
            while (rootNumber > 9) {
                rootNumber = rootNumber.toString().split('').reduce((a, b) => a + parseInt(b), 0);
            }
            
            return { rootNumber, sum: totalSum, digits: digits || [], letterSum, numberSum: sum };
        }
        
        function isMeaningfulInput(input) {
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(input)) return true;
            if (/^01[3-9]\d{8}$/.test(input.replace(/[^0-9]/g, ''))) return true;
            if (/^[A-Za-zঙ-হ]{2}\s?\d{2}\s?[A-Za-zঙ-হ]{2}\s?\d{4}$/i.test(input)) return true;
            if (/(\d{3,6})\s*(টাকা|taka)/i.test(input)) return true;
            if (/(এন্টারপ্রাইজ|ফার্ম|ট্রেডার্স|enterprise|firm)/i.test(input)) return true;
            if (/^[ঙ-হ\s]{3,30}$/.test(input)) return true;
            if (/^[A-Za-z\s]{3,30}$/.test(input)) return true;
            if (/^\d{4,15}$/.test(input)) return true;
            return false;
        }
        
        function autoDetectCategory(input) {
            if (/^01[3-9]\d{8}$/.test(input.replace(/[^0-9]/g, ''))) return "mobile_number";
            if (/^[A-Za-zঙ-হ]{2}\s?\d{2}\s?[A-Za-zঙ-হ]{2}\s?\d{4}$/i.test(input)) return "car_number";
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(input)) return "mulank";
            if (/(\d{3,6})\s*(টাকা|taka)/i.test(input)) return "product_price";
            if (/(এন্টারপ্রাইজ|ফার্ম|ট্রেডার্স|enterprise|firm)/i.test(input)) return "business_name";
            if (/^\d{4,6}$/.test(input)) return "pin_code";
            if (/^\d{9,15}$/.test(input)) return "bank_account";
            return "personal_name";
        }
        
        // ========== মূল সংখ্যার বিস্তারিত বিবরণ ==========
        function getRootNumberDescription(number, data) {
            return `
                <div class="root-description">
                    <div style="text-align: center; margin-bottom: 15px;">
                        <span class="planet-badge"><i class="fas fa-star"></i> মূল সংখ্যা: ${number} — ${data.planet}</span>
                    </div>
                    <p style="line-height: 1.8; text-align: justify;">${getPlanetInfluence(number, data)}</p>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
                        <span class="badge"><i class="fas fa-palette"></i> শুভ রং: ${data.luckyColor}</span>
                        <span class="badge"><i class="fas fa-calendar"></i> শুভ দিন: ${data.luckyDay}</span>
                        <span class="badge"><i class="fas fa-compass"></i> শুভ দিক: ${data.luckyDirection}</span>
                    </div>
                </div>
            `;
        }
        
        function getPlanetInfluence(number, data) {
            const influences = {
                1: "সূর্য গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি জন্মগতভাবে নেতৃত্বের গুণে ভূষিত হন। সূর্য যেমন সৌরজগতের কেন্দ্র, তেমনি এঁরাও নিজেদের ক্ষেত্রে কেন্দ্রীয় ভূমিকা পালন করেন। আত্মবিশ্বাস, সৃজনশীলতা ও উদ্ভাবনী শক্তি এঁদের প্রধান বৈশিষ্ট্য। এঁরা স্বাধীনচেতা, নিজের পায়ে দাঁড়াতে ভালোবাসেন এবং অন্যদের অনুপ্রাণিত করতে পারেন। তবে মাঝে মাঝে অহংকার ও কর্তৃত্বপ্রিয়তা এঁদের দুর্বলতা হয়ে দাঁড়াতে পারে। সূর্যের শক্তি এঁদের জীবনে সাফল্য ও খ্যাতি এনে দেয়, যদি এঁরা নিজেদের অহংকারকে নিয়ন্ত্রণ করতে পারেন।",
                2: "চন্দ্র গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি অত্যন্ত আবেগপ্রবণ, কল্পনাপ্রবণ ও সৃজনশীল হন। চন্দ্র যেমন সমুদ্রের জোয়ার-ভাটা নিয়ন্ত্রণ করে, তেমনি এঁদের মনও আবেগের ঢেউয়ে বিচলিত হয়। মানুষের মন বুঝতে এঁদের সেরা ক্ষমতা রয়েছে। সম্পর্কে আবদ্ধ থাকতে ভালোবাসেন এবং অন্যদের সেবা করাই এঁদের স্বভাব। এঁদের ভিতরে একজন শিল্পী, লেখক বা সঙ্গীতজ্ঞ লুকিয়ে থাকে। মানসিক অস্থিরতা ও দ্বিধাদ্বন্দ্ব এঁদের প্রধান চ্যালেঞ্জ। চন্দ্রের শক্তি এঁদের সৃজনশীলতা ও সহানুভূতি বৃদ্ধি করে।",
                3: "বৃহস্পতি গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি অত্যন্ত জ্ঞানী, আশাবাদী ও আধ্যাত্মিক হন। বৃহস্পতি গুরু গ্রহ হিসেবে পরিচিত, আর এঁরাও অন্যদের পথ প্রদর্শনে সিদ্ধহস্ত। শিক্ষক, গুরু বা পরামর্শকের মতো মানুষ এঁদের স্বাভাবিকভাবে ভক্তি করে। এঁদের কথায় অন্যদের মনে প্রভাব ফেলতে পারেন। জ্ঞানার্জন ও তা বিতরণই এঁদের জীবনের মূল উদ্দেশ্য। অতিরিক্ত আশাবাদ বা অহংকার এঁদের পতন ডেকে আনতে পারে। বৃহস্পতির আশীর্বাদে এঁরা জীবনে জ্ঞান ও সম্মান লাভ করেন।",
                4: "রাহু গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি অত্যন্ত রহস্যময়, গভীর চিন্তাবিদ ও উদ্ভাবক হন। রাহু যেমন ছায়া গ্রহ, তেমনি এঁরাও সাধারণের চোখের আড়ালে থাকতে ভালোবাসেন। যা অদৃশ্য, তা দেখতে এঁদের বিশেষ ক্ষমতা রয়েছে। সাধারণের পথে চলতে চান না, বরং নতুন পথ তৈরি করতে ভালোবাসেন। জীবনে উঠা-পড়া থাকলেও শেষ পর্যন্ত জয়ী হন। বিদেশে সাফল্য পাওয়ার সম্ভাবনা বেশি। ভ্রম, অস্থিরতা ও বিভ্রান্তি এঁদের প্রধান দুর্বলতা।",
                5: "বুধ গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি অত্যন্ত বুদ্ধিমান, চটপটে ও যোগাযোগ দক্ষ হন। বুধ যেমন দেবতাদের দূত, তেমনি এঁরাও তথ্য ও ধারণা আদান-প্রদানে সিদ্ধহস্ত। অল্প সময়ে অনেক কাজ করতে পারেন। ব্যবসায়িক বুদ্ধি এঁদের সহজাত। যেকোনো পরিস্থিতির সাথে মানিয়ে নিতে পারেন। চঞ্চলতা ও অধৈর্যতা এঁদের প্রধান দুর্বলতা। বুধের প্রভাবে এঁরা শিক্ষা, বাণিজ্য ও যোগাযোগ মাধ্যমে সাফল্য লাভ করেন।",
                6: "শুক্র গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি সৌন্দর্যপ্রিয়, বিলাসবহুল জীবন পছন্দ করেন। শুক্র যেমন সৌন্দর্য ও ভালোবাসার দেবতা, তেমনি এঁরাও শিল্প, সঙ্গীত, নৃত্যে স্বাভাবিক দক্ষতা রাখেন। সম্পর্ক ও ভালোবাসা এঁদের জীবনের প্রধান চালিকা শক্তি। মানুষকে আকর্ষণ করতে পারেন। অতিরিক্ত বিলাসিতা ও অনুভূতিপ্রবণতা এঁদের দুর্বলতা। শুক্রের কৃপায় এঁরা সুখ-সম্ভোগ ও সৌন্দর্যপূর্ণ জীবন লাভ করেন।",
                7: "কেতু গ্রহের প্রভাবে এই সংখ্যার অধিকারী ব্যক্তি আধ্যাত্মিক, গভীর চিন্তাবিদ ও গবেষক হন। কেতু যেমন মোক্ষের দিশারী, তেমনি এঁরাও অদৃশ্য জগতের সাথে যোগাযোগ রাখতে পারেন। সাধারণের চেয়ে আলাদা চিন্তা করেন। একাকীত্ব ও বিষন্নতা এঁদের প্রধান দুর্বলতা। কেতুর প্রভাবে এঁরা লেখালেখি, গবেষণা ও আধ্যাত্মিক চর্চায় সিদ্ধিলাভ করেন।",

                5: "আপনার জীবন পথ যোগাযোগ ও বাণিজ্যের। আপনাকে মানুষের সাথে মিশতে হবে, যোগাযোগ দক্ষতা কাজে লাগাতে হবে। মার্কেটিং, মিডিয়া, ট্রেডিংয়ে সাফল্য পাবেন। বুধের শক্তি আপনাকে বুদ্ধিমান ও চটপটে করবে।",
                6: "আপনার জীবন পথ সৌন্দর্য ও সম্পর্কের। আপনাকে শিল্প, সঙ্গীত, নৃত্যে নিজেকে প্রকাশ করতে হবে। বিলাস দ্রব্য, ফ্যাশন, কসমেটিকস ব্যবসায় সাফল্য পাবেন। শুক্রের শক্তি আপনাকে সৌন্দর্যপ্রিয় ও আকর্ষণীয় করবে।",
                7: "আপনার জীবন পথ আধ্যাত্মিকতা ও গবেষণার। আপনাকে গভীরে যেতে হবে, সত্য আবিষ্কার করতে হবে। লেখালেখি, গবেষণা, আধ্যাত্মিক চর্চায় সাফল্য পাবেন। কেতুর শক্তি আপনাকে আধ্যাত্মিক ও গভীর চিন্তাবিদ করবে।",
                8: "আপনার জীবন পথ ধৈর্য ও সংগ্রামের। আপনাকে পরিশ্রম করে সবকিছু অর্জন করতে হবে। শিল্প, ইঞ্জিনিয়ারিং, প্রশাসনে সাফল্য পাবেন। শনির শক্তি আপনাকে ধৈর্যশীল ও দায়িত্বশীল করবে।",
                9: "আপনার জীবন পথ সাহস ও উদ্যমের। আপনাকে প্রতিযোগিতায় এগিয়ে থাকতে হবে। সেনাবাহিনী, খেলাধুলা, উদ্যোক্তা হিসেবে সাফল্য পাবেন। মঙ্গলের শক্তি আপনাকে সাহসী ও উদ্যমী করবে।"
            };
            return paths[num] || "আপনার জীবন পথ অনন্য। নিজের শক্তিতে বিশ্বাস রাখুন, ধৈর্য ধরুন। সাফল্য আপনার জন্য অপেক্ষা করছে।";
        }
        
        function getSuccessFormula(num) {
            const formulas = {
                1: "নিজের সিদ্ধান্ত নিজে নিন, নেতৃত্ব দিন। অন্যদের মতামতকে মূল্যায়ন করুন কিন্তু শেষ সিদ্ধান্ত আপনার হোক। লাল রঙ ব্যবহার করুন, রবিবারে গুরুত্বপূর্ণ কাজ করুন।",
                2: "অন্যদের কথা শুনুন, সম্পর্ক বজায় রাখুন। টিম ওয়ার্ক করুন, জনসংযোগ বাড়ান। সাদা রঙ ব্যবহার করুন, সোমবারে নতুন উদ্যোগ নিন।",
                3: "জ্ঞান অর্জন করুন, ভাগ করুন, বৃদ্ধি পাবেন। শিক্ষার উপর ফোকাস করুন। হলুদ রঙ ব্যবহার করুন, বৃহস্পতিবারে গুরুত্বপূর্ণ সিদ্ধান্ত নিন।",
                4: "গবেষণা করুন, প্রযুক্তি ব্যবহার করুন। নতুন পথ তৈরি করুন। নীল রঙ ব্যবহার করুন, শনিবারে পরিকল্পনা করুন।",
                5: "যোগাযোগ বাড়ান, মার্কেটিং এ জোর দিন। দ্রুত সিদ্ধান্ত নিন। সবুজ রঙ ব্যবহার করুন, বুধবারে নতুন কাজ শুরু করুন।",
                6: "সৃজনশীল হোন, ডিজাইনে মন দিন। সম্পর্কের মাধ্যমে ব্যবসা বাড়ান। সাদা ও গোলাপি রঙ ব্যবহার করুন, শুক্রবারে গুরুত্বপূর্ণ কাজ করুন।",
                7: "গভীরে যান, সত্য আবিষ্কার করুন। আধ্যাত্মিকতা যোগ করুন। বেগুনি রঙ ব্যবহার করুন, শুক্রবারে ধ্যান করুন।",
                8: "সংগঠিত হোন, দীর্ঘমেয়াদী পরিকল্পনা করুন। ধৈর্য ধরুন। কালো ও নীল রঙ ব্যবহার করুন, শনিবারে গুরুত্বপূর্ণ কাজ করুন।",
                9: "উদ্যমী থাকুন, প্রতিযোগিতায় এগিয়ে থাকুন। সাহসী সিদ্ধান্ত নিন। লাল রঙ ব্যবহার করুন, মঙ্গলবারে নতুন উদ্যোগ নিন।"
            };
            return formulas[num] || "সৎ ও নিষ্ঠার সাথে কাজ করুন। নিজের শক্তিতে বিশ্বাস রাখুন। ধৈর্য ধরুন, সাফল্য আসবেই।";
        }
        
        // ========== ক্যাটাগরি লিস্ট ==========
        const categories = [
            { id: "personal_name", name: "👤 ব্যক্তির নাম", icon: "fa-user" },
            { id: "baby_name", name: "🍼 শিশুর নাম", icon: "fa-baby" },
            { id: "business_name", name: "🏢 ব্যবসার নাম", icon: "fa-building" },
            { id: "car_number", name: "🚗 গাড়ির নম্বর", icon: "fa-car" },
            { id: "bike_number", name: "🏍️ বাইক নম্বর", icon: "fa-motorcycle" },
            { id: "mobile_number", name: "📱 মোবাইল নম্বর", icon: "fa-mobile-alt" },
            { id: "product_price", name: "💰 পণ্যের মূল্য", icon: "fa-tag" },
            { id: "pin_code", name: "🔢 PIN কোড", icon: "fa-lock" },
            { id: "bank_account", name: "💳 ব্যাংক অ্যাকাউন্ট", icon: "fa-university" },
            { id: "marriage", name: "💍 বিবাহ মিলন", icon: "fa-heart" },
            { id: "new_home", name: "🏠 নতুন বাড়ি", icon: "fa-home" },
            { id: "mulank", name: "🔮 মূলাংক বিশ্লেষণ", icon: "fa-star" }
        ];
        
        function showCategorySelection() {
            const contentDiv = document.getElementById('resultContent');
            const loadingDiv = document.getElementById('loading');
            
            let optionsHtml = '<div class="option-buttons">';
            categories.forEach(cat => {
                optionsHtml += `<button class="option-btn" onclick="selectAndShowResult('${cat.id}')"><i class="fas ${cat.icon}"></i> ${cat.name}</button>`;
            });
            optionsHtml += '</div>';
            
            const html = `
                <div class="clarification-card">
                    <i class="fas fa-question-circle" style="font-size: 64px; color: #ffd700;"></i>
                    <h2>"${escapeHtml(currentRawInput)}"</h2>
                    <p style="margin: 15px 0; font-size: 18px;">আমি বুঝতে পারছি না। দয়া করে জানান আপনি কী জানতে চান:</p>
                    ${optionsHtml}
                </div>
            `;
            
            contentDiv.innerHTML = html;
            contentDiv.style.display = 'block';
            loadingDiv.style.display = 'none';
        }
        
        function selectAndShowResult(categoryId) {
            const numberData = currentNumberData;
            if (!numberData) return;
            
            const analysis = NumerologyDB.getNumberAnalysis(numberData.rootNumber);
            if (!analysis) return;
            
            let resultHtml = '';
            
            switch(categoryId) {
                case 'pin_code':
                    resultHtml = renderPinCode(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'bank_account':
                    resultHtml = renderBankAccount(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'car_number':
                case 'bike_number':
                    resultHtml = renderCarNumber(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'personal_name':
                case 'baby_name':
                    resultHtml = renderPersonalName(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'business_name':
                    resultHtml = renderBusinessName(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'product_price':
                    resultHtml = renderProductPrice(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'mulank':
                    resultHtml = renderMulank(currentRawInput, numberData.rootNumber, analysis);
                    break;
                default:
                    resultHtml = renderPersonalName(currentRawInput, numberData.rootNumber, analysis);
            }
            
            resultHtml += `
                <div class="share-buttons">
                    <button class="share-btn" onclick="copyToClipboard()"><i class="fas fa-copy"></i> কপি করুন</button>
                    <button class="share-btn" onclick="shareResult()"><i class="fas fa-share-alt"></i> শেয়ার করুন</button>
                    <button class="share-btn" onclick="window.print()"><i class="fas fa-print"></i> প্রিন্ট করুন</button>
                </div>
            `;
            
            document.getElementById('resultContent').innerHTML = resultHtml;
            document.getElementById('resultContent').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
        
        function copyToClipboard() {
            const text = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(text).then(() => alert('ফলাফল কপি হয়েছে!'));
        }
        
        function shareResult() {
            if (navigator.share) {
                navigator.share({ title: 'Numerology Intelligence Hub', text: document.getElementById('resultContent').innerText.substring(0, 500), url: window.location.href });
            } else { copyToClipboard(); }
        }
        
        // মেইন
        document.addEventListener('DOMContentLoaded', function() {
            const query = getQueryParam('q');
            if (!query) { window.location.href = 'numerology.html'; return; }
            
            currentRawInput = decodeURIComponent(query);
            currentNumberData = extractNumberFromInput(currentRawInput);
            
            if (!currentNumberData) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultContent').innerHTML = `
                    <div class="result-card" style="text-align:center">
                        <i class="fas fa-exclamation-triangle" style="font-size:64px;color:#ffd700"></i>
                        <h2>ক্ষমা করবেন!</h2>
                        <p>"${escapeHtml(currentRawInput)}" - এতে কোনো সংখ্যা খুঁজে পাওয়া যায়নি।</p>
                        <p>দয়া করে সংখ্যা সম্বলিত কিছু লিখুন (যেমন: নাম, তারিখ, নম্বর)</p>
                    </div>
                `;
                document.getElementById('resultContent').style.display = 'block';
                return;
            }
            
            if (isMeaningfulInput(currentRawInput)) {
                const category = autoDetectCategory(currentRawInput);
                selectAndShowResult(category);
            } else {
                showCategorySelection();
            }
        });
    </script>
