<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>বিশ্লেষণ ফলাফল | Numerology Intelligence Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
        বেস স্টাইল
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* ============================================================
        কার্ড স্টাইল
        ============================================================ */
        .result-card, .clarification-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .result-header { text-align: center; margin-bottom: 30px; }
        .result-number { display: inline-block; background: linear-gradient(135deg, #ffd700, #ff8c00); padding: 20px 35px; border-radius: 60px; margin-bottom: 20px; }
        .big-number { font-size: 64px; font-weight: 800; color: #1a1a2e; }
        .result-title { font-size: 28px; margin-bottom: 10px; }
        .result-subtitle { opacity: 0.8; font-size: 18px; }
        
        /* ============================================================
        ইনফো সেকশন
        ============================================================ */
        .info-section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-section h3 { color: #ffd700; margin-bottom: 12px; font-size: 22px; }
        .info-section h3 i { margin-right: 10px; }
        .info-section p { line-height: 1.8; opacity: 0.9; font-size: 16px; text-align: justify; }
        
        /* ============================================================
        ব্যাজ ও বাটন
        ============================================================ */
        .badge { display: inline-block; background: rgba(255,215,0,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-right: 10px; margin-bottom: 10px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); padding: 12px 25px; border-radius: 40px; color: white; text-decoration: none; transition: all 0.3s; margin-top: 20px; }
        .back-btn:hover { background: rgba(255,215,0,0.3); gap: 12px; }
        .share-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .share-btn { background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: all 0.3s; border: none; color: white; font-family: inherit; font-size: 14px; }
        .share-btn:hover { background: rgba(255,215,0,0.4); }
        
        /* ============================================================
        লোডিং অ্যানিমেশন
        ============================================================ */
        .loading { text-align: center; padding: 50px; }
        .loading i { font-size: 48px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ============================================================
        ক্যাটাগরি নির্বাচন UI
        ============================================================ */
        .clarification-card { text-align: center; }
        .option-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 30px 0; max-height: 450px; overflow-y: auto; padding: 10px; }
        .option-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; border: none; padding: 10px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        
        /* ============================================================
        মূল সংখ্যা বিবরণ
        ============================================================ */
        .root-description { background: rgba(255,215,0,0.15); border-radius: 20px; padding: 20px; margin-bottom: 25px; border-left: 4px solid #ffd700; }
        .planet-badge { background: rgba(255,215,0,0.3); padding: 8px 20px; border-radius: 40px; display: inline-block; margin-bottom: 15px; font-size: 16px; }
        
        /* ============================================================
        সামঞ্জস্য ফলাফলের জন্য স্টাইল (Compatibility)
        ============================================================ */
        .score-card { text-align: center; }
        .score-circle { width: 180px; height: 180px; margin: 0 auto 20px; border-radius: 50%; border: 8px solid; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); }
        .score-number { font-size: 48px; font-weight: 800; }
        .score-label { font-size: 14px; opacity: 0.8; }
        .score-level { font-size: 28px; font-weight: 600; margin-bottom: 15px; }
        .score-description { font-size: 16px; opacity: 0.9; margin-bottom: 15px; line-height: 1.6; }
        .score-summary { font-size: 14px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 20px; margin: 15px 0; }
        .progress-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        
        /* আইটেম লিস্ট */
        .items-list { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .item-badge { background: rgba(255,255,255,0.15); border-radius: 50px; padding: 8px 15px; display: inline-flex; align-items: center; gap: 10px; }
        .item-number { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: #1a1a2e; }
        .item-planet { font-weight: 500; }
        .item-type { opacity: 0.7; }
        .item-value { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* জোড়া বিশ্লেষণ */
        .pairs-container { display: flex; flex-direction: column; gap: 20px; }
        .pair-analysis { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; border-left: 4px solid; }
        .pair-analysis.special-friend { border-left-color: #ffd700; }
        .pair-analysis.friend { border-left-color: #90be6d; }
        .pair-analysis.neutral { border-left-color: #f9c74f; }
        .pair-analysis.special-enemy { border-left-color: #f9844a; }
        .pair-analysis.enemy { border-left-color: #e74c3c; }
        .pair-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .pair-items { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .pair-item { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; }
        .pair-score { font-weight: bold; }
        .pair-numbers { font-size: 14px; opacity: 0.8; margin-bottom: 12px; }
        .num-badge { display: inline-block; width: 24px; height: 24px; background: #ffd700; color: #1a1a2e; border-radius: 50%; text-align: center; line-height: 24px; font-weight: bold; margin: 0 4px; }
        .pair-analysis-text { line-height: 1.6; margin: 12px 0; }
        .pair-remedy { background: rgba(255,215,0,0.15); padding: 12px; border-radius: 12px; margin-top: 12px; font-size: 14px; }
        
        /* সামগ্রিক বিশ্লেষণ */
        .overall-analysis { line-height: 1.8; margin-bottom: 20px; }
        .best-pair, .worst-pair { padding: 12px; border-radius: 12px; margin-top: 12px; }
        .best-pair { background: rgba(46,204,113,0.2); border-left: 3px solid #2ecc71; }
        .worst-pair { background: rgba(231,76,60,0.2); border-left: 3px solid #e74c3c; }
        
        /* প্রতিকার কার্ড */
        .remedy-card { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,140,0,0.1)); }
        .remedy-content { line-height: 1.8; white-space: pre-line; }
        .remedy-note { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 14px; opacity: 0.8; }
        
        /* এরর কার্ড */
        .error-card { text-align: center; padding: 50px; }
        .error-card i { font-size: 64px; color: #ffd700; margin-bottom: 20px; }
        
        /* রেস্পন্সিভ */
        @media (max-width: 768px) {
            .result-card, .clarification-card { padding: 20px; }
            .big-number { font-size: 48px; }
            .result-title { font-size: 22px; }
            .option-btn { padding: 8px 14px; font-size: 12px; }
            .info-section p { font-size: 14px; }
            .score-circle { width: 140px; height: 140px; }
            .score-number { font-size: 36px; }
            .pair-items { font-size: 14px; }
            .item-value { max-width: 120px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <i class="fas fa-spinner"></i>
            <p>বিশ্লেষণ করা হচ্ছে...</p>
        </div>
        <div id="resultContent" style="display: none;"></div>
        <div style="text-align: center; margin-top: 30px;">
            <a href="numerology.html" class="back-btn"><i class="fas fa-arrow-left"></i> নতুন অনুসন্ধান</a>
        </div>
    </div>

    <!-- ============================================================
    স্ক্রিপ্ট লোড (সঠিক ক্রমে)
    ============================================================ -->
    <script src="js/numerology-data.js"></script>
    <script src="js/core/planet-relations.js"></script>
    <script src="js/core/number-utils.js"></script>
    <script src="js/core/compatibility-core.js"></script>
    <script src="js/renderers/compatibility-renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
