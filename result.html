    <script src="js/numerology-data.js"></script>
    
    <script>
        let currentRawInput = '';
        let currentNumberData = null;
        
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        // ========== অক্ষর-সংখ্যা ম্যাপিং ==========
        const letterValues = {
            'a':1,'b':2,'c':3,'d':4,'e':5,'f':6,'g':7,'h':8,'i':9,
            'j':1,'k':2,'l':3,'m':4,'n':5,'o':6,'p':7,'q':8,'r':9,
            's':1,'t':2,'u':3,'v':4,'w':5,'x':6,'y':7,'z':8,
            'অ':1,'আ':2,'ই':3,'ঈ':4,'উ':5,'ঊ':6,'ঋ':7,'এ':8,'ঐ':9,
            'ও':1,'ঔ':2,'ক':1,'খ':2,'গ':3,'ঘ':4,'ঙ':5,
            'চ':6,'ছ':7,'জ':8,'ঝ':9,'ঞ':1,'ট':2,'ঠ':3,'ড':4,'ঢ':5,'ণ':6,
            'ত':7,'থ':8,'দ':9,'ধ':1,'ন':2,'প':3,'ফ':4,'ব':5,'ভ':6,'ম':7,
            'য':8,'র':9,'ল':1,'শ':2,'ষ':3,'স':4,'হ':5,'ড়':9,'ঢ়':1,'য়':2,
            'ং':3,'ঃ':4,'ঁ':5
        };
        
        // ইনপুট থেকে সংখ্যা বের করা
        function extractNumberFromInput(input) {
            if (!input || input.trim() === "") return null;
            
            const bengaliDigits = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
            let converted = input;
            for (let [b, e] of Object.entries(bengaliDigits)) {
                converted = converted.replace(new RegExp(b, 'g'), e);
            }
            
            const digits = converted.match(/[0-9]/g);
            let sum = 0;
            if (digits && digits.length > 0) {
                for (let d of digits) sum += parseInt(d);
            }
            
            const lowerInput = input.toLowerCase();
            let letterSum = 0;
            for (let char of lowerInput) {
                if (letterValues[char]) {
                    letterSum += letterValues[char];
                }
            }
            
            let totalSum = sum + letterSum;
            
            if (totalSum === 0) {
                for (let i = 0; i < input.length; i++) {
                    totalSum += input.charCodeAt(i);
                }
            }
            
            let rootNumber = totalSum;
            while (rootNumber > 9) {
                rootNumber = rootNumber.toString().split('').reduce((a, b) => a + parseInt(b), 0);
            }
            
            return { rootNumber, sum: totalSum, digits: digits || [], letterSum, numberSum: sum };
        }
        
        // ========== যুক্তিপূর্ণ ইনপুট ডিটেক্ট ==========
        function isMeaningfulInput(input) {
            // 1. তারিখ প্যাটার্ন
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(input)) return true;
            // 2. মোবাইল নম্বর (বাংলাদেশ)
            if (/^01[3-9]\d{8}$/.test(input.replace(/[^0-9]/g, ''))) return true;
            // 3. গাড়ির নম্বর প্যাটার্ন
            if (/^[A-Za-zঙ-হ]{2}\s?\d{2}\s?[A-Za-zঙ-হ]{2}\s?\d{4}$/i.test(input)) return true;
            // 4. মূল্য (টাকা উল্লেখ)
            if (/(\d{3,6})\s*(টাকা|taka)/i.test(input)) return true;
            // 5. ব্যবসার নামের কীওয়ার্ড
            if (/(এন্টারপ্রাইজ|ফার্ম|ট্রেডার্স|enterprise|firm)/i.test(input)) return true;
            // 6. শুধু বাংলা অক্ষর (নাম হতে পারে)
            if (/^[ঙ-হ\s]{3,30}$/.test(input)) return true;
            // 7. শুধু ইংরেজি অক্ষর (নাম হতে পারে)
            if (/^[A-Za-z\s]{3,30}$/.test(input)) return true;
            // 8. শুধু সংখ্যা (PIN, ব্যাংক অ্যাকাউন্ট)
            if (/^\d{4,15}$/.test(input)) return true;
            
            return false;
        }
        
        // ========== অটো-ডিটেক্ট ক্যাটাগরি ==========
        function autoDetectCategory(input, numberData) {
            const lowerInput = input.toLowerCase();
            
            // মোবাইল নম্বর
            if (/^01[3-9]\d{8}$/.test(input.replace(/[^0-9]/g, ''))) return "mobile_number";
            // গাড়ির নম্বর
            if (/^[A-Za-zঙ-হ]{2}\s?\d{2}\s?[A-Za-zঙ-হ]{2}\s?\d{4}$/i.test(input)) return "car_number";
            // তারিখ
            if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(input)) return "mulank";
            // মূল্য
            if (/(\d{3,6})\s*(টাকা|taka)/i.test(input)) return "product_price";
            // ব্যবসার নাম
            if (/(এন্টারপ্রাইজ|ফার্ম|ট্রেডার্স|enterprise|firm)/i.test(input)) return "business_name";
            // সংখ্যা (PIN/ব্যাংক)
            if (/^\d{4,6}$/.test(input)) return "pin_code";
            if (/^\d{9,15}$/.test(input)) return "bank_account";
            
            // ডিফল্ট: নাম
            return "personal_name";
        }
        
        // ========== বিভিন্ন ক্যাটাগরির রেন্ডারার ==========
        function renderPersonalNameResult(input, number, data) {

                    <div class="info-section"><h3><i class="fas fa-briefcase"></i> ক্যারিয়ার ও পেশা</h3><p>${escapeHtml(data.business.description)}</p></div>

        function renderVehicleResult(input, number, data) {

        // হেল্পার ফাংশন
        function getRelationshipTip(num) {
            const tips = {1:"নেতৃত্ব দিন, সম্পর্কে আধিপত্য দেখাবেন না",2:"আবেগ ভাগ করুন, সঙ্গীকে বুঝুন",3:"আশাবাদী থাকুন, মজা করুন",4:"ধৈর্য ধরুন, সম্পর্কে স্থির থাকুন",5:"স্বাধীনতা দিন, বাঁধা দেবেন না",6:"ভালোবাসা দিন, সেবা করুন",7:"গভীরতা বজায় রাখুন, সৎ থাকুন",8:"দায়িত্ব নিন, বিশ্বস্ত থাকুন",9:"আদর্শিক হোন, উদার থাকুন"};
            return tips[num] || "সম্পর্কে সততা ও বিশ্বাস বজায় রাখুন";
        }
        
        function getBusinessSuccessTip(num) {
            const tips = {1:"নিজে নেতৃত্ব দিন, সিদ্ধান্ত নিজে নিন",2:"টিম ওয়ার্ক করুন, জনসংযোগ বাড়ান",3:"জ্ঞান বিতরণ করুন, শিক্ষার উপর ফোকাস করুন",4:"গবেষণা করুন, প্রযুক্তি ব্যবহার করুন",5:"যোগাযোগ বাড়ান, মার্কেটিং এ জোর দিন",6:"সৃজনশীল হোন, ডিজাইনে মন দিন",7:"আধ্যাত্মিকতা যোগ করুন, গুণগত মান বজায় রাখুন",8:"সংগঠিত হোন, দীর্ঘমেয়াদী পরিকল্পনা করুন",9:"উদ্যমী থাকুন, প্রতিযোগিতায় এগিয়ে থাকুন"};
            return tips[num] || "সৎ ও নিষ্ঠার সাথে ব্যবসা করুন";
        }
        
        function getVehicleSafetyTip(num) {
            const tips = {1:"দ্রুত গাড়ি চালানো এড়িয়ে চলুন",2:"ভারী যানবাহন থেকে দূরে থাকুন",3:"নিয়মিত সার্ভিস করান",4:"রাতে সতর্ক থাকুন, হেডলাইট চেক করুন",5:"সিগন্যাল মেনে চলুন, ওভারটেকিং এড়ান",6:"আরামদায়ক গতিতে চলুন",7:"একাগ্র থাকুন, ফোন ব্যবহার করবেন না",8:"ব্রেক নিয়মিত চেক করুন",9:"অতিরিক্ত গতি এড়িয়ে চলুন"};
            return tips[num] || "সাবধানে ও নিয়ম মেনে চালনা করুন";
        }
        
        function getPhoneCareerTip(num) {
            const tips = {1:"নেতৃত্বের পদ, প্রশাসন",2:"সৃজনশীল পেশা, শিল্পকলা",3:"শিক্ষকতা, পরামর্শ",4:"গবেষণা, প্রযুক্তি",5:"মার্কেটিং, সেলস",6:"শিল্পকলা, বিনোদন",7:"আধ্যাত্মিকতা, লেখালেখি",8:"প্রশাসন, ব্যবস্থাপনা",9:"উদ্যোক্তা, রাজনীতি"};
            return tips[num] || "যোগাযোগমূলক পেশা উত্তম";
        }
        
        function getPhoneWarning(num) {
            const warns = {4:"অপ্রয়োজনীয় কথাবার্তা এড়িয়ে চলুন",8:"অন্যদের সাথে বিতর্ক কম করুন"};
            return warns[num] || "গোপনীয়তা বজায় রাখুন";
        }
        
        function getAlternativePrices(num) {
            const alts = {1:"১১১, ৫৫৫, ৯৯৯",2:"২২২, ৬৬৬, ৮৮৮",3:"৩৩৩, ৬৬৬, ৯৯৯",4:"৩৩৩, ৬৬৬, ৯৯৯",5:"৫৫৫, ১১১, ৭৭৭",6:"৬৬৬, ৯৯৯, ৩৩৩",7:"৭৭৭, ১১১, ৫৫৫",8:"৩৩৩, ৬৬৬, ৯৯৯",9:"৯৯৯, ৫৫৫, ১১১"};
            return alts[num] || "৩৩৩, ৬৬৬, ৯৯৯";
        }
        
        // ========== ক্যাটাগরি বাটন (যুক্তিহীন ইনপুটের জন্য) ==========
        const categories = [
            { id: "personal_name", name: "👤 ব্যক্তির নাম", icon: "fa-user" },
            { id: "baby_name", name: "🍼 শিশুর নাম", icon: "fa-baby" },
            { id: "business_name", name: "🏢 ব্যবসার নাম", icon: "fa-building" },
            { id: "car_number", name: "🚗 গাড়ির নম্বর", icon: "fa-car" },
            { id: "bike_number", name: "🏍️ বাইক নম্বর", icon: "fa-motorcycle" },
            { id: "mobile_number", name: "📱 মোবাইল নম্বর", icon: "fa-mobile-alt" },
            { id: "product_price", name: "💰 পণ্যের মূল্য", icon: "fa-tag" },
            { id: "pin_code", name: "🔢 PIN কোড", icon: "fa-lock" },
            { id: "bank_account", name: "💳 ব্যাংক অ্যাকাউন্ট", icon: "fa-university" },
            { id: "marriage", name: "💍 বিবাহ মিলন", icon: "fa-heart" },
            { id: "new_home", name: "🏠 নতুন বাড়ি", icon: "fa-home" },
            { id: "mulank", name: "🔮 মূলাংক বিশ্লেষণ", icon: "fa-star" }
        ];
        
        function showCategorySelection(input) {
            const contentDiv = document.getElementById('resultContent');
            const loadingDiv = document.getElementById('loading');
            
            let optionsHtml = '<div class="option-buttons">';
            categories.forEach(cat => {
                optionsHtml += `<button class="option-btn" onclick="selectAndShowResult('${cat.id}')"><i class="fas ${cat.icon}"></i> ${cat.name}</button>`;
            });
            optionsHtml += '</div>';
            
            const html = `
                <div class="clarification-card">
                    <i class="fas fa-question-circle" style="font-size: 64px; color: #ffd700;"></i>
                    <h2>"${escapeHtml(currentRawInput)}"</h2>
                    <p style="margin: 15px 0; font-size: 18px;">আমি বুঝতে পারছি না। দয়া করে জানান আপনি কী জানতে চান:</p>
                    ${optionsHtml}
                </div>
            `;
            
            contentDiv.innerHTML = html;
            contentDiv.style.display = 'block';
            loadingDiv.style.display = 'none';
        }
        
        function selectAndShowResult(categoryId) {
            const numberData = currentNumberData;
            if (!numberData) return;
            
            const analysis = NumerologyDB.getNumberAnalysis(numberData.rootNumber);
            if (!analysis) return;
            
            let resultHtml = '';
            
            switch(categoryId) {
                case 'personal_name':
                case 'baby_name':
                    resultHtml = renderPersonalNameResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'business_name':
                    resultHtml = renderBusinessNameResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'car_number':
                case 'bike_number':
                    resultHtml = renderVehicleResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'mobile_number':
                    resultHtml = renderPhoneResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'product_price':
                    resultHtml = renderPriceResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                case 'mulank':
                    resultHtml = renderMulankResult(currentRawInput, numberData.rootNumber, analysis);
                    break;
                default:
                    resultHtml = renderPersonalNameResult(currentRawInput, numberData.rootNumber, analysis);
            }
            
            resultHtml += `
                <div class="share-buttons">
                    <button class="share-btn" onclick="copyToClipboard()"><i class="fas fa-copy"></i> কপি করুন</button>
                    <button class="share-btn" onclick="shareResult()"><i class="fas fa-share-alt"></i> শেয়ার করুন</button>
                    <button class="share-btn" onclick="window.print()"><i class="fas fa-print"></i> প্রিন্ট করুন</button>
                </div>
            `;
            
            document.getElementById('resultContent').innerHTML = resultHtml;
            document.getElementById('resultContent').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
        
        function copyToClipboard() {
            const text = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(text).then(() => alert('ফলাফল কপি হয়েছে!'));
        }
        
        function shareResult() {
            if (navigator.share) {
                navigator.share({ title: 'Numerology Intelligence Hub', text: document.getElementById('resultContent').innerText.substring(0, 500), url: window.location.href });
            } else { copyToClipboard(); }
        }
        
        // ========== মেইন ==========
        document.addEventListener('DOMContentLoaded', function() {
            const query = getQueryParam('q');
            if (!query) { window.location.href = 'numerology.html'; return; }
            
            currentRawInput = decodeURIComponent(query);
            currentNumberData = extractNumberFromInput(currentRawInput);
            
            if (!currentNumberData) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultContent').innerHTML = `
                    <div class="result-card" style="text-align:center">
                        <i class="fas fa-exclamation-triangle" style="font-size:64px;color:#ffd700"></i>
                        <h2>ক্ষমা করবেন!</h2>
                        <p>"${escapeHtml(currentRawInput)}" - এতে কোনো সংখ্যা খুঁজে পাওয়া যায়নি।</p>
                        <p>দয়া করে সংখ্যা সম্বলিত কিছু লিখুন (যেমন: নাম, তারিখ, নম্বর)</p>
                    </div>
                `;
                document.getElementById('resultContent').style.display = 'block';
                return;
            }
            
            // যুক্তিপূর্ণ ইনপুট কিনা চেক
            if (isMeaningfulInput(currentRawInput)) {
                // সরাসরি রেজাল্ট দেখাও
                const category = autoDetectCategory(currentRawInput, currentNumberData);
                selectAndShowResult(category);
            } else {
                // যুক্তিহীন ইনপুট → ক্যাটাগরি জিজ্ঞেস করো
                showCategorySelection(currentRawInput);
            }
        });
    </script>
</body>
</html>
