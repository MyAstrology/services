<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Intelligence Hub</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0a0a2a;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 span {
            color: gold;
        }
        .search-box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
        }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            margin: 10px 0;
        }
        button {
            padding: 12px 25px;
            background: gold;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }
        .example {
            background: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            width: 180px;
        }
        footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Numerology <span>Intelligence Hub</span></h1>
        <p>আপনার সংখ্যার গভীরতম রহস্য উন্মোচন করুন</p>

        <div class="search-box">
            <h2>🔮 আপনি কী জানতে চান?</h2>
            <input type="text" id="searchInput" placeholder="যেমন: 15-08-1990 বা রাহুল বা রাহুল + 15-08-1990">
            <br>
            <button id="searchBtn">বিশ্লেষণ করুন</button>
            <div class="examples">
                <span class="example" data-val="15-08-1990">📅 জন্মতারিখ</span>
                <span class="example" data-val="রাহুল">👤 নাম</span>
                <span class="example" data-val="01712345678">📱 মোবাইল</span>
                <span class="example" data-val="প্রদ্যুৎ এন্টারপ্রাইজ">🏢 ব্যবসার নাম</span>
                <span class="example" data-val="985 টাকা">💰 মূল্য</span>
                <span class="example" data-val="রাহুল + 15-08-1990">🔗 নাম + তারিখ</span>
                <span class="example" data-val="রাহুল + সুমন">👥 দুই নাম</span>
            </div>
        </div>

        <div class="features">
            <div class="feature">📊 মূলাংক বিশ্লেষণ</div>
            <div class="feature">👤 নাম বিশ্লেষণ</div>
            <div class="feature">🔗 সামঞ্জস্য মিলন</div>
            <div class="feature">🚗 গাড়ির নম্বর</div>
        </div>

        <footer>© 2024 myastrology.in | Numerology Intelligence Hub</footer>
    </div>

    <script>
        (function() {
            const input = document.getElementById('searchInput');
            const btn = document.getElementById('searchBtn');
            const examples = document.querySelectorAll('.example');

            function analyze() {
                let val = input.value.trim();
                if (!val) {
                    alert('দয়া করে কিছু লিখুন');
                    return;
                }
                window.location.href = 'result.html?q=' + encodeURIComponent(val);
            }

            btn.onclick = analyze;
            input.onkeypress = function(e) { if (e.key === 'Enter') analyze(); };
            examples.forEach(el => {
                el.onclick = function() {
                    input.value = this.getAttribute('data-val');
                    analyze();
                };
            });
            input.focus();
        })();
    </script>
</body>
</html>
